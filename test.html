<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>✧ Clean Markdown · syntax highlight</title>
  <!-- marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- highlight.js + clean light theme -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- additional languages for better coverage -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
  <style>
    /* ----- CLEAN, MINIMAL RESET ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f9fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      padding: 1.8rem;
      color: #1e1e2a;
    }

    /* clean card – no blur, soft border */
    .app-card {
      max-width: 1400px;
      width: 100%;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.03), 0 2px 4px rgba(0, 0, 0, 0.02);
      border: 1px solid #e9ebf0;
      overflow: hidden;
    }

    .app-header {
      padding: 1.8rem 2.2rem 1rem 2.2rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      border-bottom: 1px solid #edf0f5;
    }

    .app-header h1 {
      font-weight: 500;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      color: #15151f;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-header h1::before {
      content: "✧";
      font-size: 2rem;
      font-weight: 300;
      color: #4b587c;
    }

    .toolbar {
      display: flex;
      gap: 10px;
    }

    /* clean buttons – flat, subtle */
    .btn {
      background: #ffffff;
      border: 1px solid #d0d6e0;
      padding: 0.5rem 1.3rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 450;
      color: #2c3a5e;
      cursor: pointer;
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: none;
    }

    .btn i {
      font-style: normal;
      font-size: 1.1em;
    }

    .btn:hover {
      background: #f5f7fb;
      border-color: #b1bed6;
      color: #1a253b;
    }

    .btn:active {
      background: #e9ecf3;
      transform: scale(0.98);
    }

    /* two‑column layout — clean divider */
    .editor-preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #eef1f6;
    }

    .pane {
      background: #ffffff;
      padding: 2rem 2rem 2.2rem 2rem;
      display: flex;
      flex-direction: column;
      min-height: 550px;
      height: 70vh;
      max-height: 800px;
    }

    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
      padding-bottom: 0.5rem;
      border-bottom: 1.5px solid #eef2f7;
    }

    .pane-header h2 {
      font-weight: 450;
      font-size: 1.2rem;
      color: #2e3b54;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pane-header h2 .badge {
      background: #eef2f7;
      color: #334十五;
      font-size: 0.7rem;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 30px;
      margin-left: 8px;
      letter-spacing: 0.2px;
      border: 1px solid #dee5ed;
    }

    .editor-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* clean textarea — monospaced, light border */
    textarea {
      flex: 1;
      width: 100%;
      padding: 1.2rem 1.5rem;
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.95rem;
      line-height: 1.6;
      background: #fbfcff;
      border: 1px solid #dee5ed;
      border-radius: 18px;
      resize: vertical;
      color: #1e232f;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
      outline: none;
      transition: border 0.15s;
    }

    textarea:focus {
      border-color: #a3b3d1;
      background: #ffffff;
    }

    /* preview box — clean, spacious */
    .preview-box {
      flex: 1;
      background: #fbfcff;
      border-radius: 18px;
      padding: 1.5rem 1.8rem;
      border: 1px solid #dee5ed;
      overflow-y: auto;
      color: #1f2633;
      scroll-behavior: smooth;
    }

    /* ----- MARKDOWN TYPOGRAPHY (clean, airy) ----- */
    .preview-box :first-child { margin-top: 0; }
    .preview-box :last-child { margin-bottom: 0; }

    .preview-box h1, .preview-box h2, .preview-box h3,
    .preview-box h4, .preview-box h5, .preview-box h6 {
      margin-top: 1.8em;
      margin-bottom: 0.6em;
      font-weight: 500;
      line-height: 1.3;
      color: #121826;
    }
    .preview-box h1 { font-size: 2rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.25rem; }
    .preview-box h2 { font-size: 1.6rem; border-bottom: 1px solid #eef2f6; padding-bottom: 0.2rem; }
    .preview-box h3 { font-size: 1.35rem; }
    .preview-box p { margin: 1.2em 0; line-height: 1.7; }
    .preview-box a { color: #2b5797; text-decoration: none; border-bottom: 1px dotted #b4c6e0; }
    .preview-box a:hover { color: #0f2d5e; border-bottom: 1px solid; }
    .preview-box ul, .preview-box ol { padding-left: 1.8rem; margin: 1.3em 0; }
    .preview-box li { margin: 0.35em 0; }
    .preview-box blockquote {
      margin: 1.6em 0;
      padding: 0.8rem 1.6rem;
      border-left: 4px solid #b3c2db;
      background: #f6f9fe;
      border-radius: 0 16px 16px 0;
      color: #2c3f5c;
    }
    .preview-box code {
      background: #f0f4fa;
      padding: 0.2em 0.45em;
      border-radius: 8px;
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 0.9em;
      color: #a63c5e;
    }
    /* code blocks — clean, matching github light */
    .preview-box pre {
      background: #f6f8fa;
      padding: 1.2rem 1.5rem;
      border-radius: 16px;
      overflow-x: auto;
      margin: 1.8em 0;
      font-size: 0.9rem;
      line-height: 1.55;
      border: 1px solid #e1e7ef;
      box-shadow: none;
    }
    .preview-box pre code {
      background: transparent;
      padding: 0;
      color: #24292f;
      font-size: inherit;
    }
    .preview-box .hljs {
      background: transparent;
      padding: 0;
    }
    .preview-box hr {
      margin: 2.5rem 0;
      border: 0;
      height: 1px;
      background: #dee5ed;
    }
    .preview-box table {
      border-collapse: collapse;
      width: 100%;
      margin: 1.8em 0;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #dee5ed;
    }
    .preview-box th, .preview-box td {
      border: 1px solid #e2e8f0;
      padding: 0.7rem 1.2rem;
      text-align: left;
    }
    .preview-box th {
      background: #f1f5fb;
      font-weight: 500;
    }
    .preview-box img {
      max-width: 100%;
      border-radius: 12px;
      margin: 1.2rem 0;
    }

    /* responsive */
    @media (max-width: 700px) {
      body { padding: 0.8rem; }
      .app-header { padding: 1.4rem 1.4rem 0.8rem; }
      .app-header h1 { font-size: 1.5rem; }
      .editor-preview-grid { grid-template-columns: 1fr; }
      .pane { min-height: 450px; height: auto; max-height: 700px; padding: 1.5rem; }
    }

    /* footer — simple */
    .footer-note {
      padding: 1rem 2.2rem 1.2rem;
      font-size: 0.8rem;
      color: #6a7c9e;
      display: flex;
      justify-content: flex-end;
      border-top: 1px solid #edf0f5;
      background: #ffffff;
    }
    .footer-note span {
      opacity: 0.8;
    }
  </style>
</head>
<body>
<div class="app-card">
  <header class="app-header">
    <h1>Clean Markdown</h1>
    <div class="toolbar">
      <button class="btn" id="sampleBtn" title="Load sample with code">
        <i>📋</i> Sample
      </button>
      <button class="btn" id="clearBtn" title="Clear editor">
        <i>🧹</i> Clear
      </button>
    </div>
  </header>

  <div class="editor-preview-grid">
    <!-- editor panel -->
    <section class="pane">
      <div class="pane-header">
        <h2>✎ Editor <span class="badge">Markdown</span></h2>
        <span style="font-size:0.8rem; opacity:0.55;">live preview</span>
      </div>
      <div class="editor-wrapper">
        <textarea id="markdownInput" placeholder="# Start typing…" spellcheck="false"></textarea>
      </div>
    </section>

    <!-- preview panel -->
    <section class="pane">
      <div class="pane-header">
        <h2>👁️ Preview <span class="badge">highlighted</span></h2>
        <span style="font-size:0.8rem; opacity:0.55;">syntax color</span>
      </div>
      <div id="previewOutput" class="preview-box"></div>
    </section>
  </div>

  <footer class="footer-note">
    <span>marked + highlight.js · clean & minimal</span>
  </footer>
</div>

<script>
  (function() {
    'use strict';

    const textarea = document.getElementById('markdownInput');
    const previewDiv = document.getElementById('previewOutput');
    const sampleBtn = document.getElementById('sampleBtn');
    const clearBtn = document.getElementById('clearBtn');

    // ----- configure marked with highlight.js -----
    if (typeof marked !== 'undefined') {
      marked.setOptions({
        breaks: true,
        gfm: true,
        headerIds: false,
        mangle: false,
        highlight: function(code, lang) {
          if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) {
            try {
              return hljs.highlight(code, { language: lang }).value;
            } catch (e) {}
          }
          if (typeof hljs !== 'undefined') {
            try {
              return hljs.highlightAuto(code).value;
            } catch (e) {}
          }
          // fallback escape
          return code.replace(/[&<>]/g, function(m) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m];
          });
        }
      });
    }

    // ----- sample markdown (showcases syntax highlighting) -----
    const SAMPLE_MARKDOWN = `# Clean & readable

## Syntax highlighting for code

### JavaScript

\`\`\`javascript
// A clean function
const formatName = (first, last) => {
  return \`\${first} \${last}\`.trim();
};

console.log(formatName('Ada', 'Lovelace'));
\`\`\`

### Python

\`\`\`python
def greet(name="world"):
    """Return a friendly greeting."""
    return f"Hello, {name}!"

print(greet("clean markdown"))
\`\`\`

### JSON

\`\`\`json
{
  "editor": "clean",
  "highlight": true,
  "theme": "light minimal"
}
\`\`\`

### Bash

\`\`\`bash
# list files with details
ls -la
echo "✨ Done"
\`\`\`

---

### Inline & formatting

- **Bold text** and *italic* and \`inline.code()\`
- Lists are spacious
- [link to marked](https://marked.js.org/)

> “Simplicity is the ultimate sophistication.”  
> — Leonardo da Vinci

| Feature    | Clean |
|------------|-------|
| whitespace | ✓     |
| borders    | soft  |
| focus      | text  |

---

**Edit freely — preview updates instantly.**
`;

    // ----- render function -----
    function renderMarkdown() {
      const rawText = textarea.value;
      if (typeof marked !== 'undefined') {
        try {
          const html = marked.parse(rawText);
          previewDiv.innerHTML = html;
          if (rawText.trim() === '') {
            previewDiv.innerHTML = '<p style="color: #5f738c; font-style: italic;">✨ Your rendered content will appear here…</p>';
          }
        } catch (e) {
          previewDiv.innerHTML = `<p style="color: #b13e3e;">⚠️ Rendering error: ${e.message}</p>`;
        }
      } else {
        previewDiv.innerHTML = '<p style="color: #a75800;">⚠️ Marked library not loaded.</p>';
      }
    }

    function loadSample() {
      textarea.value = SAMPLE_MARKDOWN;
      renderMarkdown();
    }

    function clearEditor() {
      textarea.value = '';
      renderMarkdown();
    }

    // event listeners
    textarea.addEventListener('input', renderMarkdown);
    sampleBtn.addEventListener('click', loadSample);
    clearBtn.addEventListener('click', clearEditor);

    // initialization
    function init() {
      if (typeof marked !== 'undefined') {
        loadSample();
      } else {
        previewDiv.innerHTML = '<p>Loading parser…</p>';
        let attempts = 0;
        const check = setInterval(() => {
          if (typeof marked !== 'undefined') {
            clearInterval(check);
            loadSample();
          } else if (++attempts > 30) {
            clearInterval(check);
            previewDiv.innerHTML = '<p style="color:#a00;">❌ Library load failed.</p>';
          }
        }, 80);
      }
    }

    init();
  })();
</script>
</body>
</html>
