<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CTF Reverse Terminal OS</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Highlight.js -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>

<style>
body { font-family: monospace; }
</style>
</head>

<body class="bg-black text-green-400 min-h-screen">

<div class="max-w-5xl mx-auto p-6">

  <!-- Header -->
  <div class="mb-4">
    <h1 class="text-lg font-bold">CTF REVERSE ENGINEERING TERMINAL</h1>
    <p class="text-green-600 text-sm">type "help" | TAB for autocomplete</p>
  </div>

  <!-- Output -->
  <div id="output" class="space-y-2 mb-4"></div>

  <!-- Input -->
  <div class="flex items-center">
    <span id="prompt" class="mr-2">kali@ctf:~/reverse$</span>
    <input id="cmd"
      class="bg-black outline-none w-full text-green-400"
      onkeydown="handleCommand(event)">
  </div>

</div>

<script>
/* =========================
   STATE
========================= */
let path = ["reverse"];
const commands = ["ls", "cd", "view", "clear", "help"];

/* =========================
   PRINT
========================= */
function print(text, html=false) {
  const out = document.getElementById("output");
  const div = document.createElement("div");
  div.innerHTML = html ? text : text;
  out.appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
}

/* =========================
   PROMPT
========================= */
function updatePrompt() {
  document.getElementById("prompt").innerText =
    `kali@ctf:~/${path.slice(1).join("/") || ""}$`;
}

function getPath() {
  return path.join("/");
}

/* =========================
   AUTOCOMPLETE (TAB)
========================= */
async function autocomplete(input) {
  const value = input.value.trim();
  const parts = value.split(" ");
  const cmd = parts[0];

  // COMMAND autocomplete
  if (parts.length === 1) {
    const match = commands.filter(c => c.startsWith(cmd));

    if (match.length === 1) {
      input.value = match[0] + " ";
    } else if (match.length > 1) {
      print(match.join("   "));
    }
    return;
  }

  // FILE autocomplete
  const arg = parts[1] || "";
  const items = await fetchDir();

  const names = items.map(i => i.name.replace(".md", ""));
  const match = names.filter(n => n.startsWith(arg));

  if (match.length === 1) {
    parts[1] = match[0];
    input.value = parts.join(" ");
  } else if (match.length > 1) {
    print(match.join("   "));
  }
}

/* =========================
   FETCH GITHUB DIR
========================= */
async function fetchDir() {
  const user = location.hostname.split('.')[0];
  const repo = user + ".github.io";

  const url =
    `https://api.github.com/repos/${user}/${repo}/contents/${getPath()}`;

  const res = await fetch(url);
  const data = await res.json();

  if (!Array.isArray(data)) return [];

  return data;
}

/* =========================
   LS
========================= */
async function ls() {
  const data = await fetchDir();

  let out = "";

  data.forEach(item => {
    if (item.type === "dir") {
      out += `<span class="text-blue-400">[${item.name}]</span> `;
    } else {
      out += item.name.replace(".md", "") + " ";
    }
  });

  print(out, true);
}

/* =========================
   CD
========================= */
function cd(dir) {
  if (!dir) return;

  if (dir === "..") {
    if (path.length > 1) path.pop();
  } else {
    path.push(dir);
  }

  updatePrompt();
}

/* =========================
   VIEW (REAL MARKDOWN)
========================= */
async function view(file) {
  if (!file) return;

  const user = location.hostname.split('.')[0];
  const repo = user + ".github.io";

  const url =
    `https://raw.githubusercontent.com/${user}/${repo}/main/${getPath()}/${file}.md`;

  const res = await fetch(url);

  if (!res.ok) {
    print("file not found");
    return;
  }

  const md = await res.text();

  const html = marked.parse(md);

  const wrapped = `
    <div class="border border-green-500 p-4 rounded mt-2">
      ${html}
    </div>
  `;

  print(wrapped, true);

  setTimeout(() => {
    document.querySelectorAll("pre code").forEach(block => {
      hljs.highlightElement(block);
    });
  }, 0);
}

/* =========================
   MAIN COMMAND HANDLER
========================= */
async function handleCommand(e) {
  if (e.key === "Tab") {
    e.preventDefault();
    autocomplete(e.target);
    return;
  }

  if (e.key !== "Enter") return;

  const input = e.target.value.trim();
  print("kali@ctf$ " + input);

  const args = input.split(" ");
  const cmd = args[0];

  switch(cmd) {

    case "help":
      print(`
Commands:
ls
cd [dir]
view [file]
clear
`);
      break;

    case "ls":
      await ls();
      break;

    case "cd":
      cd(args[1]);
      break;

    case "view":
      await view(args[1]);
      break;

    case "clear":
      document.getElementById("output").innerHTML = "";
      break;

    default:
      print("command not found");
  }

  e.target.value = "";
}

/* INIT */
updatePrompt();
</script>

</body>
</html>
