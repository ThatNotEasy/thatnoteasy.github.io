<body class="bg-black min-h-screen flex items-center justify-center p-4 text-gray-300 selection:bg-green-900 selection:text-white">

<!-- TERMINAL CONTAINER -->
<div class="w-full max-w-full h-[90vh] flex flex-col bg-gray-950 border border-gray-800 rounded-lg shadow-[0_0_50px_rgba(34,197,94,0.1)] relative overflow-hidden" onclick="document.getElementById('cmd').focus()">
  
  <!-- Scanlines -->
  <div class="scanlines absolute inset-0 z-20 pointer-events-none opacity-40"></div>

  <!-- HEADER -->
  <div class="flex items-center justify-between px-4 py-2 bg-gray-900 border-b border-gray-800 z-30 shrink-0">
    <div class="flex space-x-2">
      <div class="w-3 h-3 rounded-full bg-red-500 hover:bg-red-400 transition-colors"></div>
      <div class="w-3 h-3 rounded-full bg-yellow-500 hover:bg-yellow-400 transition-colors"></div>
      <div class="w-3 h-3 rounded-full bg-green-500 hover:bg-green-400 transition-colors"></div>
    </div>
    <div class="text-xs text-gray-500 font-bold tracking-widest">TTY1 - BASH</div>
    <div class="flex items-center space-x-2">
      <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
      <span class="text-[10px] text-green-600 font-bold">ONLINE</span>

  <!-- OUTPUT AREA -->
  <div id="output" 
    class="flex-1 overflow-y-auto overflow-x-auto p-6 space-y-2 z-10 font-mono text-sm leading-relaxed outline-none whitespace-pre">

  <!-- INPUT AREA -->

    <span id="prompt" class="text-sm font-semibold select-none mr-2 whitespace-nowrap">
      $</span>
    <input id="cmd" 
      class="flex-1 bg-transparent outline-none text-gray-100 caret-transparent font-mono text-sm placeholder-gray-700"
      placeholder="Enter command..."
      autocomplete="off"
      spellcheck="false"
      onkeydown="handleKey(event)">
    <div class="w-2 h-4 bg-lime-500 cursor-blink ml-1 pointer-events-none"></div>
  </div>

</div>

<script>
/* =========================
   CONFIGURATION
========================= */
const CONFIG = {
  USER: "reverse101",  // Change this to your name
  HOST: "localhost",  // Change this to your hostname
};

/* =========================
    VIRTUAL FILE SYSTEM (VFS)
    Loaded from reverse/ directory via manifest.json
 ========================= */

async function loadFileSystem() {
  const fs = {};
  let files = [];

  // Try to load manifest first
  try {
    const manifestRes = await fetch('manifest.json');
    if (manifestRes.ok) {
      const manifest = await manifestRes.json();
      
      // Initialize all directories
      if (manifest.directories) {
        manifest.directories.forEach(dir => {
          fs[dir] = {};
        });
      }
      
      // Load all files from manifest
      files = manifest.structure || [];
    }
  } catch (e) {
    console.warn('Could not load manifest.json, using fallback');
    // Fallback to hardcoded files
    files = [
      { dir: "linux", name: "CrackMe-By-ZenithSouu.md" },
      { dir: "linux", name: "poc.py" },
      { dir: "windows", name: "Find-The-Key.md" }
    ];
    fs["linux"] = {};
    fs["windows"] = {};
    fs["android"] = {};
  }

  // Fetch all files
  for (const f of files) {
    // Skip empty entries
    if (!f.name || f.name.trim() === '') continue;
    
    try {
      const res = await fetch(`reverse/${f.dir}/${f.name}`);
      if (res.ok) {
        fs[f.dir][f.name] = await res.text();
      }
    } catch (e) {
      console.warn(`Failed to load reverse/${f.dir}/${f.name}`);
    }
  }

  // Wrap in reverse directory
  return { reverse: fs };
}

/* =========================
    STATE
 ========================= */
let shellState = {
  path: ["reverse"],
  history: [], 
  historyIndex: -1, 
};

let fileSystem = {};

/* =========================
   CORE LOGIC
========================= */

// Helper to get the object reference of the current directory
function getCurrentDirObj() {
  let current = fileSystem;
  for (let i = 0; i < shellState.path.length; i++) {
    const segment = shellState.path[i];
    if (current[segment] && typeof current[segment] === 'object') {
      current = current[segment];
    } else {
      return null; // Invalid path
    }
  }
  return current;
}

/* =========================
   INIT & BOOT
========================= */
window.addEventListener('load', async () => {
  await playBootSequence();
  fileSystem = await loadFileSystem();
  initTerminal();
});

function playBootSequence() {
  return new Promise(resolve => {
    const bootLog = document.getElementById("boot-log");
    const lines = [
      `[ ${new Date().toLocaleTimeString()}] Loading Linux kernel 6.1.0...`,
      "[ OK ] Started Dispatch Password Requests to Console Key Watch.",
      "[ OK ] Reached target Graphical Interface.",
      "[ OK ] Started Network Manager.",
      `[ OK ] Logged in as ${CONFIG.USER}`
    ];
    
    let i = 0;
    const interval = setInterval(() => {
      if (i < lines.length) {
        bootLog.innerText += lines[i] + "\n";
        i++;
      } else {
        clearInterval(interval);
        setTimeout(() => {
          const screen = document.getElementById('boot-screen');
          screen.style.opacity = '0';
          setTimeout(() => {
            screen.style.display = 'none';
            resolve();
          }, 1000);
        }, 500);
      }
    }, 400);
  });
}

function initTerminal() {
  printWelcome();
  document.getElementById('cmd').focus();
  updatePrompt();
}

function printWelcome() {
  const tuxArt = `
<span class="text-blue-400">
        .--.
       |o_o |
       |:_/ |
      //   \\ \\
     (|     | )
    /'\\_   _/\`
    \\___)=(___/
</span>
<span class="text-white font-bold">Reverse Engineering Writeups Repository</span>
<span class="text-gray-400">Content: CTF challenges, crackmes, binary analysis</span>
<span class="text-gray-400">Platforms: Linux, Windows, Android</span><br>
<span class="text-gray-600 mt-2">Type <span class="text-green-400">'help'</span> for a list of commands.</span><br>
`;
  print(tuxArt, "system");
}

/* =========================
   CORE FUNCTIONS
========================= */

function print(text, type = "normal") {
  const output = document.getElementById("output");
  const div = document.createElement("div");
  
  const typeClasses = {
    normal: "text-gray-100",
    success: "text-lime-400 font-semibold",
    error: "text-red-500 font-bold",
    system: "text-gray-500 italic text-sm",
    info: "text-cyan-400",
    command: "text-lime-500 font-semibold",
    dir: "text-cyan-400 font-bold",
    file: "text-gray-300",
    warning: "text-yellow-400",
    completion: "text-purple-400"
  };
  
  div.className = typeClasses[type] || typeClasses.normal;
  div.innerHTML = text;

  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function updatePrompt() {
  const fullPath = shellState.path.join("/") || "/";
  const displayPath = fullPath === "" ? "~" : `/reverse/${fullPath}`;
  
  const promptHTML = `<span class="text-lime-400">${CONFIG.USER}</span><span class="text-gray-500">@</span><span class="text-cyan-400">${CONFIG.HOST}</span><span class="text-gray-600"> in </span><span class="text-yellow-400">${displayPath}</span><span class="text-lime-500"> ❯ </span>`;
  
  document.getElementById("prompt").innerHTML = promptHTML;
}

/* =========================
   COMMANDS
========================= */

const commands = {
  help: () => {
    const helpText = `
<span class="text-lime-400 font-bold">AVAILABLE COMMANDS:</span>
  <span class="text-cyan-400">ls [dir]</span>          List directory contents
  <span class="text-cyan-400">cd [dir]</span>          Change directory
  <span class="text-cyan-400">pwd</span>               Print working directory
  <span class="text-cyan-400">cat [file]</span>        View raw file content
  <span class="text-cyan-400">view [file]</span>       View file (Markdown supported)
  <span class="text-cyan-400">echo [text]</span>       Print text
  <span class="text-cyan-400">date</span>              Show current date/time
  <span class="text-cyan-400">uname [-a]</span>        System information
  <span class="text-cyan-400">neofetch</span>          System info with logo
  <span class="text-cyan-400">clear</span>             Clear terminal
  <span class="text-cyan-400">whoami</span>            Print current user
  <span class="text-cyan-400">tree [dir]</span>        Show directory tree
  <span class="text-cyan-400">find [pattern]</span>    Find files by name
  <span class="text-cyan-400">history [-c]</span>      Show/clear command history
  <span class="text-yellow-400">Ctrl+C</span>          Interrupt/kill current input
`;
    print(helpText);
  },

  clear: () => {
    document.getElementById('output').innerHTML = "";
  },

  whoami: () => {
    print(CONFIG.USER, "success");
  },

  pwd: () => {
    const p = shellState.path.join("/");
    print(p || "/", "info");
  },

  echo: (...args) => {
    print(args.join(" "), "normal");
  },

  date: () => {
    print(new Date().toString(), "info");
  },

  uname: (...args) => {
    if (args.includes("-a")) {
      print("Linux thatnoteasy 6.1.0-generic x86_64 GNU/Linux", "info");
    } else {
      print("Linux", "info");
    }
  },

  neofetch: () => {
    const ascii = `
<span class="text-blue-400">
        .-''''-.
      .'  _  '.  
     /   (o)o  \\
    |   '._.'   |
     '.        .'
       '-....-'
</span>
<span class="text-gray-300">
  thatnoteasy@localhost
  ---------------
  OS: thatnoteasy.github.io
  Host: Web Terminal
  Kernel: JavaScript
  Shell: bash (custom)
  Terminal: Browser
  CPU: Web Assembly
  Memory: Infinite
</span>`;
    print(ascii);
  },

  ls: (dir) => {
    let currentDir;
    
    if (dir) {
      // Handle path like "reverse/linux" or just "reverse"
      const parts = dir.split("/");
      currentDir = fileSystem;
      for (const p of parts) {
        if (currentDir[p] && typeof currentDir[p] === 'object') {
          currentDir = currentDir[p];
        } else {
          print(`ls: cannot access '${dir}': No such directory`, "error");
          return;
        }
      }
    } else {
      currentDir = getCurrentDirObj();
    }
    
    if (!currentDir) return print("Error: Directory corrupted", "error");

    const items = Object.keys(currentDir);
    if (items.length === 0) {
      print("(empty directory)", "system");
      return;
    }

    let out = "";
    items.forEach(name => {
      const isDir = typeof currentDir[name] === 'object';
      const icon = isDir ? "📁" : "📄";
      const colorClass = isDir ? "text-cyan-400 font-bold" : "text-gray-300";
      out += `<span class="${colorClass} block py-1">${icon}  ${name}</span>`;
    });
    print(out);
  },

  cd: (dir) => {
    if (!dir || dir === "/" || dir === "~") {
      shellState.path = [];
    } else if (dir === "..") {
      if (shellState.path.length > 0) shellState.path.pop();
    } else {
      // Remove trailing slash if present
      const cleanDir = dir.replace(/\/$/, '');
      const currentDir = getCurrentDirObj();
      if (currentDir[cleanDir] && typeof currentDir[cleanDir] === 'object') {
        shellState.path.push(cleanDir);
      } else {
        print(`bash: cd: ${dir}: No such file or directory`, "error");
        return;
      }
    }
    updatePrompt();
  },

  cat: async (file) => {
    if (!file) {
      print("usage: cat [filename]", "info");
      return;
    }
    const currentDir = getCurrentDirObj();
    
    if (currentDir[file]) {
      // Check if it's a file (string)
      if (typeof currentDir[file] === 'string') {
        // Escape HTML for display
        const safeContent = currentDir[file]
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        print(`<pre class="text-gray-300 whitespace-pre-wrap font-mono text-xs">${safeContent}</pre>`, "raw");
      } else {
        print(`cat: ${file}: Is a directory`, "error");
      }
    } else {
      print(`cat: ${file}: No such file`, "error");
    }
  },

  view: async (file) => {
    if (!file) {
      print("usage: view [filename]", "info");
      return;
    }
    const currentDir = getCurrentDirObj();
    
    if (currentDir[file]) {
      if (typeof currentDir[file] === 'string') {
        const content = currentDir[file];
        // Parse Markdown
        const html = marked.parse(content);
        
        // Show in modal
        document.getElementById('modal-title').textContent = `📄 ${file}`;
        const modalContent = document.getElementById('modal-content');
        modalContent.innerHTML = html;
        
        // Highlight code blocks
        setTimeout(() => {
          modalContent.querySelectorAll('pre code').forEach((block) => {
            hljs.highlightElement(block);
          });
        }, 0);
        
        // Show modal
        document.getElementById('file-modal').classList.remove('hidden');
        print(`[View] Opening ${file}...`, "info");
      } else {
        print(`view: ${file}: Is a directory`, "error");
      }
    } else {
      print(`view: ${file}: No such file`, "error");
    }
  },

  tree: (dir = ".") => {
    const currentDir = dir === "." ? getCurrentDirObj() : fileSystem;
    const buildTree = (obj, prefix = "", isLast = true) => {
      let output = "";
      const keys = Object.keys(obj);
      keys.forEach((key, idx) => {
        const isLastItem = idx === keys.length - 1;
        const isDir = typeof obj[key] === 'object';
        const connector = isLastItem ? "└── " : "├── ";
        output += `<span class="${isDir ? 'text-cyan-400 font-semibold' : 'text-gray-300'} inline-block mr-4">${prefix}${connector}${key}</span>`;
        if (isDir) {
          const newPrefix = prefix + (isLastItem ? "    " : "│   ");
          output += buildTree(obj[key], newPrefix, isLastItem);
        }
      });
      return output;
    };
    const treeOutput = buildTree(currentDir);
    print(treeOutput || "(empty)", "normal");
  },

  find: (pattern) => {
    if (!pattern) {
      print("usage: find [pattern]", "info");
      return;
    }
    const results = [];
    const search = (obj, path = "") => {
      for (const key in obj) {
        const currentPath = path ? path + "/" + key : key;
        if (key.includes(pattern)) {
          const isDir = typeof obj[key] === 'object';
          results.push({ name: currentPath, isDir });
        }
        if (typeof obj[key] === 'object') {
          search(obj[key], currentPath);
        }
      }
    };
    search(fileSystem);
    if (results.length === 0) {
      print(`find: No files matching '${pattern}'`, "error");
    } else {
      results.forEach(r => {
        const color = r.isDir ? "text-cyan-400 font-semibold" : "text-gray-300";
        print(`<span class="${color}">${r.name}${r.isDir ? '/' : ''}</span>`);
      });
    }
  },

  history: (...args) => {
    if (args.includes("-c")) {
      shellState.history = [];
      shellState.historyIndex = -1;
      print("History cleared", "success");
    } else if (shellState.history.length === 0) {
      print("No history", "system");
    } else {
      shellState.history.forEach((cmd, i) => {
        print(`  ${i + 1}  ${cmd}`, "normal");
      });
    }
  }
};

/* =========================
   MODAL FUNCTIONS
 ========================= */
function closeFileModal() {
  document.getElementById('file-modal').classList.add('hidden');
}

// Close modal when clicking outside of it
document.addEventListener('click', (event) => {
  const modal = document.getElementById('file-modal');
  if (event.target === modal) {
    closeFileModal();
  }
});

// Close modal with Escape key
document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape') {
    closeFileModal();
  }
});

/* =========================
    INPUT HANDLER
 ========================= */
function handleKey(e) {
  const inputField = document.getElementById("cmd");

  // Tab auto-completion
  if (e.key === "Tab") {
    e.preventDefault();
    const input = inputField.value;
    const parts = input.split(/\s+/);
    
    const cmd = parts[0]?.toLowerCase();
    const last = parts[parts.length - 1];
    const isCmdPosition = parts.length === 1;
    const isPathArg = parts.length === 2 && ["cat", "view", "cd", "tree", "find", "ls"].includes(cmd);
    
    let matches = [];
    
    if (isCmdPosition) {
      // Auto-complete commands
      const cmds = Object.keys(commands);
      matches = cmds.filter(c => c.startsWith(last));
    } else if (isPathArg) {
      // Auto-complete paths using current working directory
      let currentDir = getCurrentDirObj();
      let searchPath = last;
      const pathParts = searchPath.split("/");
      const partialName = pathParts.pop();
      
      // Navigate through specified path if provided
      if (pathParts.length > 0 && pathParts[0] !== "") {
        let tempDir = fileSystem;
        for (const p of pathParts) {
          if (tempDir[p] && typeof tempDir[p] === 'object') {
            tempDir = tempDir[p];
          } else {
            tempDir = null;
            break;
          }
        }
        if (tempDir) currentDir = tempDir;
      }
      
      if (currentDir) {
        matches = Object.keys(currentDir)
          .filter(n => n.startsWith(partialName))
          .map(m => {
            const isDir = typeof currentDir[m] === 'object';
            return m + (isDir ? '/' : '');
          });
        
        if (pathParts.length > 0 && pathParts[0] !== "") {
          matches = matches.map(m => pathParts.join("/") + "/" + m);
        }
      }
    }
    
    if (matches.length === 1) {
      parts[parts.length - 1] = matches[0];
      inputField.value = parts.join(" ");
    } else if (matches.length > 1) {
      // Show suggestions with better formatting
      const suggestions = matches.map(m => {
        const isDir = m.endsWith('/');
        return `<span class="${isDir ? 'text-cyan-400' : 'text-gray-300'}">${m}</span>`;
      }).join("<span class='text-gray-600 mx-2'>|</span>");
      print(suggestions, "raw");
    }
    return;
  }

  // Ctrl+C to interrupt
  if (e.key === "c" && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    print("^C", "error");
    inputField.value = "";
    return;
  }

  // History
  if (e.key === "ArrowUp") {
    e.preventDefault();
    if (shellState.historyIndex > 0) {
      shellState.historyIndex--;
      inputField.value = shellState.history[shellState.historyIndex];
    }
  } else if (e.key === "ArrowDown") {
    e.preventDefault();
    if (shellState.historyIndex < shellState.history.length - 1) {
      shellState.historyIndex++;
      inputField.value = shellState.history[shellState.historyIndex];
    } else {
      shellState.historyIndex = shellState.history.length;
      inputField.value = "";
    }
  } 
  // Execute
  else if (e.key === "Enter") {
    const input = inputField.value.trim();
    if (!input) return;

    // Echo command
    const currentPath = shellState.path.join("/") || "/";
    print(`<span class="text-lime-500 font-bold">${CONFIG.USER}@${CONFIG.HOST}:${currentPath}$</span> <span class="text-gray-100">${input}</span>`, "raw");
    
    shellState.history.push(input);
    shellState.historyIndex = shellState.history.length;

    const args = input.split(/\s+/);
    const cmd = args.shift().toLowerCase();

    if (commands[cmd]) {
      commands[cmd](...args);
    } else {
      print(`bash: ${cmd}: command not found`, "error");
    }

    inputField.value = "";
  }
}
</script>
