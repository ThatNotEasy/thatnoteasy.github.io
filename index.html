<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Linux Terminal</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Marked -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- Highlight.js -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>

<style>
/* Minimal Custom CSS */
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap');

body { font-family: 'Fira Code', monospace; }

/* Scrollbar Styling */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #030712; }
::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #22c55e; }

/* CRT Scanline Effect */
.scanlines {
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
  background-size: 100% 2px, 3px 100%;
  pointer-events: none;
}

/* Blinking Cursor */
.cursor-blink { animation: blink 1s step-end infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>

<body class="bg-black min-h-screen flex items-center justify-center p-4 text-gray-300 selection:bg-green-900 selection:text-white">

<!-- BOOT SCREEN -->
<div id="boot-screen" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center transition-opacity duration-1000">
  <div class="text-green-500 text-4xl font-bold tracking-tighter mb-4 animate-pulse">LINUX_KERNEL</div>
  <div id="boot-log" class="font-mono text-xs text-green-700"></div>
</div>

<!-- TERMINAL CONTAINER -->
<div class="w-full max-w-6xl h-[90vh] flex flex-col bg-gray-950 border border-gray-800 rounded-lg shadow-[0_0_50px_rgba(34,197,94,0.1)] relative overflow-hidden" onclick="document.getElementById('cmd').focus()">
  
  <!-- Scanlines -->
  <div class="scanlines absolute inset-0 z-20 pointer-events-none opacity-40"></div>

  <!-- HEADER -->
  <div class="flex items-center justify-between px-4 py-2 bg-gray-900 border-b border-gray-800 z-30 shrink-0">
    <div class="flex space-x-2">
      <div class="w-3 h-3 rounded-full bg-red-500 hover:bg-red-400 transition-colors"></div>
      <div class="w-3 h-3 rounded-full bg-yellow-500 hover:bg-yellow-400 transition-colors"></div>
      <div class="w-3 h-3 rounded-full bg-green-500 hover:bg-green-400 transition-colors"></div>
    </div>
    <div class="text-xs text-gray-500 font-bold tracking-widest">TTY1 - BASH</div>
    <div class="flex items-center space-x-2">
      <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
      <span class="text-[10px] text-green-600 font-bold">ONLINE</span>
    </div>
  </div>

  <!-- OUTPUT AREA -->
  <div id="output" 
    class="flex-1 overflow-y-auto p-6 space-y-2 z-10 font-mono text-sm leading-relaxed outline-none whitespace-pre-wrap break-words">
    <!-- Dynamic Content -->
  </div>

  <!-- INPUT AREA -->
  <div class="flex items-center px-4 py-3 bg-gray-900 border-t border-gray-800 z-30 shrink-0">
    <span id="prompt" class="text-green-500 mr-3 font-bold select-none">
      guest@localhost:~$     </span>
    <input id="cmd" 
      class="flex-1 bg-transparent outline-none text-green-400 caret-transparent font-mono placeholder-gray-800"
      placeholder="Enter command..."
      autocomplete="off"
      spellcheck="false"
      onkeydown="handleKey(event)">
    <div class="w-2.5 h-5 bg-green-500 cursor-blink ml-1 pointer-events-none"></div>
  </div>

</div>

<script>
/* =========================
   CONFIGURATION
========================= */
const CONFIG = {
  USER: "guest",      // Change this to your name
  HOST: "localhost",  // Change this to your hostname
};

/* =========================
   VIRTUAL FILE SYSTEM (VFS)
========================= */
const fileSystem = {
  "readme.txt": "Welcome to your personal web terminal.\n\nYou can use ls, cd, cat, and view.",
  "todo.md": "# Tasks\n\n- [ ] Check emails\n- [ ] Update website\n- [ ] Backup data",
  "Documents": {
    "notes.txt": "Meeting at 10:00 AM\nBring the laptop",
    "resume.pdf": "This is a simulated PDF file.",
    "Work": {
      "project_plan.md": "## Q4 Roadmap\n1. Design\n2. Development\n3. Testing"
    }
  },
  "Downloads": {
    "image.png": "Simulated image file.",
    "installer.sh": "#!/bin/bash\necho 'Installing...'"
  },
  ".bashrc": `
# Personal .bashrc configuration
export EDITOR=vim
alias ll='ls -la'
alias grep='grep --color=auto'
`,
  "projects": {
    "website": {
      "index.html": "<h1>Hello World</h1>",
      "style.css": "body { background: black; }"
    }
  }
};

/* =========================
   STATE
========================= */
let shellState = {
  path: ["~"], // The current path stack
  history: [], 
  historyIndex: -1, 
};

/* =========================
   CORE LOGIC
========================= */

// Helper to get the object reference of the current directory
function getCurrentDirObj() {
  let current = fileSystem;
  // Start at 1 to skip root "~"
  for (let i = 1; i < shellState.path.length; i++) {
    const segment = shellState.path[i];
    if (current[segment] && typeof current[segment] === 'object') {
      current = current[segment];
    } else {
      return null; // Invalid path
    }
  }
  return current;
}

/* =========================
   INIT & BOOT
========================= */
window.addEventListener('load', async () => {
  await playBootSequence();
  initTerminal();
});

function playBootSequence() {
  return new Promise(resolve => {
    const bootLog = document.getElementById("boot-log");
    const lines = [
      `[ ${new Date().toLocaleTimeString()}] Loading Linux kernel 6.1.0...`,
      "[ OK ] Started Dispatch Password Requests to Console Key Watch.",
      "[ OK ] Reached target Graphical Interface.",
      "[ OK ] Started Network Manager.",
      `[ OK ] Logged in as ${CONFIG.USER}`
    ];
    
    let i = 0;
    const interval = setInterval(() => {
      if (i < lines.length) {
        bootLog.innerText += lines[i] + "\n";
        i++;
      } else {
        clearInterval(interval);
        setTimeout(() => {
          const screen = document.getElementById('boot-screen');
          screen.style.opacity = '0';
          setTimeout(() => {
            screen.style.display = 'none';
            resolve();
          }, 1000);
        }, 500);
      }
    }, 400);
  });
}

function initTerminal() {
  printWelcome();
  document.getElementById('cmd').focus();
}

function printWelcome() {
  const tuxArt = `
<span class="text-blue-400">
        .--.
       |o_o |
       |:_/ |
      //   \\ \\
     (|     | )
    /'\\_   _/\`
    \\___)=(___/
</span>
<span class="text-white font-bold">Welcome to Ubuntu 22.04 LTS (GNU/Linux 5.15.0-generic x86_64)</span>
<span class="text-gray-400">System load: 0.01</span>
<span class="text-gray-400">Users logged in: 1</span>
<span class="text-gray-400">Usage of /: 12.5% of 50.0GB</span>
<span class="text-gray-600 mt-2">Type <span class="text-green-400">'help'</span> for a list of commands.</span>
`;
  print(tuxArt, "system");
}

/* =========================
   CORE FUNCTIONS
========================= */

function print(text, type = "normal") {
  const output = document.getElementById("output");
  const div = document.createElement("div");
  
  const typeClasses = {
    normal: "text-gray-300",
    success: "text-green-400 font-bold",
    error: "text-red-500 font-bold",
    system: "text-gray-600 italic text-sm", // Welcome banner usually gray
    info: "text-blue-300",
    command: "text-green-500",
    dir: "text-blue-400 font-bold",
    file: "text-gray-300"
  };
  
  div.className = typeClasses[type] || typeClasses.normal;
  div.innerHTML = text;

  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function updatePrompt() {
  const p = shellState.path.join("/").replace("~/", "");
  const displayPath = p ? "~/" + p : "~";
  document.getElementById("prompt").innerText = `${CONFIG.USER}@${CONFIG.HOST}:${displayPath}$`;
}

/* =========================
   COMMANDS
========================= */

const commands = {
  help: () => {
    const helpText = `
<span class="text-green-400 font-bold">AVAILABLE COMMANDS:</span>
  <span class="text-gray-300">ls</span>       List directory contents
  <span class="text-gray-300">cd [dir]</span>  Change directory
  <span class="text-gray-300">view [file]</span> Read file (Markdown supported)
  <span class="text-gray-300">cat [file]</span>  View raw file content
  <span class="text-gray-300">clear</span>     Clear terminal
  <span class="text-gray-300">whoami</span>    Print effective userid
`;
    print(helpText);
  },

  clear: () => {
    document.getElementById('output').innerHTML = "";
  },

  whoami: () => {
    print(CONFIG.USER, "success");
  },

  ls: () => {
    const currentDir = getCurrentDirObj();
    if (!currentDir) return print("Error: Directory corrupted", "error");

    const items = Object.keys(currentDir);
    if (items.length === 0) {
      print("(empty directory)", "system");
      return;
    }

    let out = "";
    items.forEach(name => {
      const isDir = typeof currentDir[name] === 'object';
      const icon = isDir ? "[DIR]" : "[FILE]";
      const colorClass = isDir ? "text-blue-400 font-bold" : "text-gray-300";
      // Adjust width for cleaner column look
      out += `<span class="${colorClass} inline-block w-40 mr-2">${icon} ${name}</span>`;
    });
    print(out);
  },

  cd: (dir) => {
    if (!dir || dir === "~") {
      shellState.path = ["~"];
    } else if (dir === "..") {
      if (shellState.path.length > 1) shellState.path.pop();
    } else {
      const currentDir = getCurrentDirObj();
      // Check if item exists and is a directory
      if (currentDir[dir] && typeof currentDir[dir] === 'object') {
        shellState.path.push(dir);
      } else {
        print(`bash: cd: ${dir}: No such file or directory`, "error");
        return;
      }
    }
    updatePrompt();
  },

  cat: async (file) => {
    if (!file) {
      print("usage: cat [filename]", "info");
      return;
    }
    const currentDir = getCurrentDirObj();
    
    if (currentDir[file]) {
      // Check if it's a file (string)
      if (typeof currentDir[file] === 'string') {
        // Escape HTML for display
        const safeContent = currentDir[file]
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        print(`<pre class="text-gray-300 whitespace-pre-wrap font-mono text-xs">${safeContent}</pre>`, "raw");
      } else {
        print(`cat: ${file}: Is a directory`, "error");
      }
    } else {
      print(`cat: ${file}: No such file`, "error");
    }
  },

  view: async (file) => {
    if (!file) {
      print("usage: view [filename]", "info");
      return;
    }
    const currentDir = getCurrentDirObj();
    
    if (currentDir[file]) {
      if (typeof currentDir[file] === 'string') {
        const content = currentDir[file];
        // Parse Markdown if content exists
        const html = marked.parse(content);
        print(`<div class="border-l-2 border-green-500 pl-4 my-2 font-mono markdown-body">${html}</div>`, "raw");
        
        // Highlight code blocks
        document.querySelectorAll("pre code").forEach((block) => {
          hljs.highlightElement(block);
        });
      } else {
        print(`view: ${file}: Is a directory`, "error");
      }
    } else {
      print(`view: ${file}: No such file`, "error");
    }
  }
};

/* =========================
   INPUT HANDLER
========================= */
function handleKey(e) {
  const inputField = document.getElementById("cmd");

  // History
  if (e.key === "ArrowUp") {
    e.preventDefault();
    if (shellState.historyIndex > 0) {
      shellState.historyIndex--;
      inputField.value = shellState.history[shellState.historyIndex];
    }
  } else if (e.key === "ArrowDown") {
    e.preventDefault();
    if (shellState.historyIndex < shellState.history.length - 1) {
      shellState.historyIndex++;
      inputField.value = shellState.history[shellState.historyIndex];
    } else {
      shellState.historyIndex = shellState.history.length;
      inputField.value = "";
    }
  } 
  // Execute
  else if (e.key === "Enter") {
    const input = inputField.value.trim();
    if (!input) return;

    // Echo command
    const currentPath = shellState.path.join("/").replace("~/","") || "~";
    print(`<span class="text-green-500 font-bold">${CONFIG.USER}@${CONFIG.HOST}:${currentPath}$</span> <span class="text-white">${input}</span>`, "raw");
    
    shellState.history.push(input);
    shellState.historyIndex = shellState.history.length;

    const args = input.split(/\s+/);
    const cmd = args.shift().toLowerCase();

    if (commands[cmd]) {
      commands[cmd](...args);
    } else {
      print(`bash: ${cmd}: command not found`, "error");
    }

    inputField.value = "";
  }
}
</script>

</body>
</html>
