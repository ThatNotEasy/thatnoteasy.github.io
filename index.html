<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reverse101</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Marked -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- Highlight.js -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>

<style>
/* Minimal Custom CSS for effects Tailwind doesn't have by default */
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap');

body { font-family: 'Fira Code', monospace; }

/* Scrollbar Styling */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #030712; }
::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #22c55e; }

/* CRT Scanline Effect */
.scanlines {
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
  background-size: 100% 2px, 3px 100%;
  pointer-events: none;
}

/* Blinking Cursor */
.cursor-blink { animation: blink 1s step-end infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>

<body class="bg-black min-h-screen flex items-center justify-center p-4 text-gray-300 selection:bg-green-900 selection:text-white">

<!-- BOOT SCREEN -->
<div id="boot-screen" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center transition-opacity duration-1000">
  <div class="text-green-500 text-4xl font-bold tracking-tighter mb-4 animate-pulse">REVERSE101_OS</div>
  <div id="boot-log" class="font-mono text-xs text-green-700"></div>
</div>

<!-- TERMINAL CONTAINER -->
<div class="w-full max-w-6xl h-[90vh] flex flex-col bg-gray-950 border border-gray-800 rounded-lg shadow-[0_0_50px_rgba(34,197,94,0.1)] relative overflow-hidden" onclick="document.getElementById('cmd').focus()">
  
  <!-- Scanlines -->
  <div class="scanlines absolute inset-0 z-20 pointer-events-none opacity-40"></div>

  <!-- HEADER -->
  <div class="flex items-center justify-between px-4 py-2 bg-gray-900 border-b border-gray-800 z-30 shrink-0">
    <div class="flex space-x-2">
      <div class="w-3 h-3 rounded-full bg-red-500 hover:bg-red-400 transition-colors"></div>
      <div class="w-3 h-3 rounded-full bg-yellow-500 hover:bg-yellow-400 transition-colors"></div>
      <div class="w-3 h-3 rounded-full bg-green-500 hover:bg-green-400 transition-colors"></div>
    </div>
    <div class="text-xs text-gray-500 font-bold tracking-widest">SESSION: ROOT_ACCESS_GRANTED</div>
    <div class="flex items-center space-x-2">
      <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
      <span class="text-[10px] text-green-600 font-bold">ONLINE</span>
    </div>
  </div>

  <!-- OUTPUT AREA -->
  <!-- space-y-2 adds the clean line gap between commands -->
  <div id="output" 
    class="flex-1 overflow-y-auto p-6 space-y-2 z-10 font-mono text-sm leading-relaxed outline-none whitespace-pre-wrap break-words">
    <!-- Dynamic Content -->
  </div>

  <!-- INPUT AREA -->
  <div class="flex items-center px-4 py-3 bg-gray-900 border-t border-gray-800 z-30 shrink-0">
    <span id="prompt" class="text-green-500 mr-3 font-bold select-none">
      reverse101@root:~$     </span>
    <input id="cmd" 
      class="flex-1 bg-transparent outline-none text-green-400 caret-transparent font-mono placeholder-gray-800"
      placeholder="Enter command..."
      autocomplete="off"
      spellcheck="false"
      onkeydown="handleKey(event)">
    <div class="w-2.5 h-5 bg-green-500 cursor-blink ml-1 pointer-events-none"></div>
  </div>

</div>

<script>
/* =========================
   CONFIGURATION
========================= */
const CONFIG = {
  GITHUB_USER: "YOUR_USERNAME_HERE",
  GITHUB_REPO: "YOUR_USERNAME_HERE.github.io",
  BRANCH: "main"
};

const IS_DEMO_MODE = CONFIG.GITHUB_USER === "YOUR_USERNAME_HERE";

/* =========================
   STATE
========================= */
let shellState = {
  path: ["~"], 
  history: [], 
  historyIndex: -1, 
};

/* =========================
   INIT & BOOT
========================= */
window.addEventListener('load', async () => {
  await playBootSequence();
  initTerminal();
});

function playBootSequence() {
  return new Promise(resolve => {
    const bootLog = document.getElementById("boot-log");
    const lines = [
      "Loading kernel modules...",
      "[ OK ] Mounting virtual filesystem...",
      "[ OK ] Starting networking services...",
      "[ OK ] Bypassing security protocols...",
      "[ OK ] Reverse101 Environment Ready."
    ];
    
    let i = 0;
    const interval = setInterval(() => {
      if (i < lines.length) {
        bootLog.innerText += lines[i] + "\n";
        i++;
      } else {
        clearInterval(interval);
        setTimeout(() => {
          const screen = document.getElementById('boot-screen');
          screen.style.opacity = '0';
          setTimeout(() => {
            screen.style.display = 'none';
            resolve();
          }, 1000);
        }, 500);
      }
    }, 300);
  });
}

function initTerminal() {
  printWelcome();
  document.getElementById('cmd').focus();
}

function printWelcome() {
  const art = ```
<span class="text-green-500 font-bold text-lg">
    _         __     _         __  __      __  
   /_\  _ __ /  \ __| |_____ _|  \/  |___ /  \ 
  / _ \| '_ \ () / _` / -_) \ / |\/| / -_) () |
 /_/ \_\ .__/\__/\__,_\___/_\_\_|  |_\___|\__/ 
       |_|                                     ```
</span>
<span class="text-gray-600 text-xs block mt-2 mb-4">--------------------------------------------</span>
<span class="text-white font-bold">Reverse101 CTF Terminal</span>
<span class="text-gray-500 block">System integrity check: 100%</span>
<span class="text-gray-500 block">User privileges: ROOT</span>
<span class="text-gray-600 text-xs block mt-2 mb-4">--------------------------------------------</span>
Type <span class="text-green-400 font-bold">'help'</span> to see available commands.
`;
  print(art, "system");
}

/* =========================
   CORE FUNCTIONS
========================= */

function print(text, type = "normal") {
  const output = document.getElementById("output");
  const div = document.createElement("div");
  
  // Tailwind mapping for types
  const typeClasses = {
    normal: "text-gray-300",
    success: "text-green-400 font-bold",
    error: "text-red-500 font-bold",
    system: "text-gray-600 italic text-sm",
    info: "text-blue-300",
    command: "text-green-500",
    dir: "text-blue-400 font-bold",
    file: "text-gray-300"
  };
  
  div.className = typeClasses[type] || typeClasses.normal;
  
  // Handle Markdown/HTML
  if (type === "raw" || type === "system") {
    div.innerHTML = text;
  } else {
    div.innerHTML = text;
  }

  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function updatePrompt() {
  const p = shellState.path.join("/").replace("~/", "");
  const displayPath = p ? "~/" + p : "~";
  document.getElementById("prompt").innerText = `reverse101@root:${displayPath}$`;
}

/* =========================
   COMMANDS
========================= */

const commands = {
  help: () => {
    const helpText = `
<span class="text-green-400 font-bold">AVAILABLE COMMANDS:</span>
  <span class="text-gray-300">ls</span>       List directory contents
  <span class="text-gray-300">cd [dir]</span>  Change directory
  <span class="text-gray-300">view [file]</span> Read markdown file
  <span class="text-gray-300">cat [file]</span>  View raw file content
  <span class="text-gray-300">tree</span>      Show directory tree
  <span class="text-gray-300">clear</span>     Clear terminal
  <span class="text-gray-300">whoami</span>    Print effective userid
`;
    print(helpText);
  },

  clear: () => {
    document.getElementById('output').innerHTML = "";
  },

  whoami: () => {
    print("reverse101", "success");
  },

  ls: async () => {
    if (IS_DEMO_MODE) return mockFS.ls();
    try {
      const data = await fetchDir();
      let out = "";
      data.forEach(item => {
        const icon = item.type === 'dir' ? "[DIR]" : "[FILE]";
        const colorClass = item.type === 'dir' ? "text-blue-400 font-bold" : "text-gray-300";
        // Using inline-block to create grid-like list look
        out += `<span class="${colorClass} inline-block w-40 mr-2">${icon} ${item.name.replace(".md","")}</span>`;
      });
      print(out);
    } catch (e) {
      print(`Error: ${e.message}`, "error");
    }
  },

  cd: async (dir) => {
    if (IS_DEMO_MODE) return mockFS.cd(dir);
    
    if (!dir || dir === "~") {
      shellState.path = ["~"];
    } else if (dir === "..") {
      if (shellState.path.length > 1) shellState.path.pop();
    } else {
      try {
        const newPath = [...shellState.path, dir];
        const url = `https://api.github.com/repos/${CONFIG.GITHUB_USER}/${CONFIG.GITHUB_REPO}/contents/${newPath.slice(1).join("/")}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("Directory not found");
        const data = await res.json();
        if (data.type !== 'dir') throw new Error("Not a directory");
        shellState.path = newPath;
      } catch (e) {
        print(`bash: cd: ${dir}: No such file or directory`, "error");
        return;
      }
    }
    updatePrompt();
  },

  tree: async () => {
    print("Fetching directory tree...", "system");
    if (IS_DEMO_MODE) return print("challenges/ <span class='text-gray-500'>(folder)</span>", "raw");

    async function getTree(path, prefix = "") {
      try {
        const url = `https://api.github.com/repos/${CONFIG.GITHUB_USER}/${CONFIG.GITHUB_REPO}/contents/${path}`;
        const res = await fetch(url);
        if (!res.ok) return;
        const data = await res.json();
        if (!Array.isArray(data)) return; 

        data.forEach((item, index) => {
          const isLast = index === data.length - 1;
          const connector = isLast ? "└── " : "├── ";
          const color = item.type === 'dir' ? "text-blue-400" : "text-gray-500";
          print(`${prefix}${connector}<span class="${color}">${item.name}</span>`, "raw");
          
          if (item.type === 'dir') {
            const nextPrefix = prefix + (isLast ? "    " : "│   ");
            getTree(item.path, nextPrefix);
          }
        });
      } catch (e) {}
    }
    
    const currentPath = shellState.path.slice(1).join("/");
    await getTree(currentPath);
  },

  view: async (file) => {
    if (!file) {
      print("usage: view [filename]", "info");
      return;
    }
    if (IS_DEMO_MODE) return print("# Welcome to Reverse101\n\nThis is the challenge briefing.", "raw");

    try {
      const content = await fetchFile(file);
      const html = marked.parse(content);
      print(`<div class="border-l-2 border-green-500 pl-4 my-2 font-mono">${html}</div>`, "raw");
      document.querySelectorAll("pre code").forEach((block) => {
        hljs.highlightElement(block);
      });
    } catch (e) {
      print(`view: ${file}: File not found.`, "error");
    }
  },

  cat: async (file) => {
    if (!file) {
      print("usage: cat [filename]", "info");
      return;
    }
    if (IS_DEMO_MODE) return print("SECRET_KEY = {rev3rse_101}", "raw");

    try {
      const content = await fetchFile(file);
      print(`<pre class="text-gray-300 whitespace-pre-wrap font-mono text-xs">${escapeHtml(content)}</pre>`, "raw");
    } catch (e) {
      print(`cat: ${file}: File not found.`, "error");
    }
  }
};

/* =========================
   API HELPERS
========================= */

async function fetchDir() {
  const path = shellState.path.slice(1).join("/");
  const url = `https://api.github.com/repos/${CONFIG.GITHUB_USER}/${CONFIG.GITHUB_REPO}/contents/${path}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("Network error");
  return await res.json();
}

async function fetchFile(filename) {
  let targetFile = filename;
  if (!filename.includes('.')) targetFile += ".md";
  const path = shellState.path.slice(1).join("/");
  const url = `https://raw.githubusercontent.com/${CONFIG.GITHUB_USER}/${CONFIG.GITHUB_REPO}/${CONFIG.BRANCH}/${path}/${targetFile}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("File not found");
  return await res.text();
}

function escapeHtml(text) {
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

const mockFS = {
  ls: () => print(`<span class="text-blue-400 font-bold">[DIR] challenges</span> <span class="text-gray-300">[FILE] readme.md</span>`, "raw"),
  cd: (dir) => {
    if (dir === "challenges") {
      shellState.path = ["~", "challenges"];
      updatePrompt();
    } else {
      print("Demo mode: only 'challenges' available.", "error");
    }
  }
};

/* =========================
   INPUT HANDLER
========================= */
function handleKey(e) {
  const inputField = document.getElementById("cmd");

  // History
  if (e.key === "ArrowUp") {
    e.preventDefault();
    if (shellState.historyIndex > 0) {
      shellState.historyIndex--;
      inputField.value = shellState.history[shellState.historyIndex];
    }
  } else if (e.key === "ArrowDown") {
    e.preventDefault();
    if (shellState.historyIndex < shellState.history.length - 1) {
      shellState.historyIndex++;
      inputField.value = shellState.history[shellState.historyIndex];
    } else {
      shellState.historyIndex = shellState.history.length;
      inputField.value = "";
    }
  } 
  // Execute
  else if (e.key === "Enter") {
    const input = inputField.value.trim();
    if (!input) return;

    // Echo command
    const currentPath = shellState.path.join("/").replace("~/","") || "~";
    print(`<span class="text-green-500 font-bold">reverse101@root:${currentPath}$</span> <span class="text-white">${input}</span>`, "raw");
    
    shellState.history.push(input);
    shellState.historyIndex = shellState.history.length;

    const args = input.split(/\s+/);
    const cmd = args.shift().toLowerCase();

    if (commands[cmd]) {
      commands[cmd](...args);
    } else {
      print(`bash: ${cmd}: command not found`, "error");
    }

    inputField.value = "";
  }
}
</script>

</body>
</html>
