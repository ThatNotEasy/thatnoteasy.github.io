<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CTF Terminal Writeup</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: "Courier New", monospace;
    }

    .cursor::after {
      content: "_";
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }
  </style>
</head>

<body class="bg-black text-green-400 min-h-screen">

<div class="max-w-4xl mx-auto p-6">

  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-2xl font-bold">[ CTF WRITEUP TERMINAL ]</h1>
    <p class="text-green-600 text-sm">type your writeup like a hacker...</p>
  </div>

  <!-- Terminal Input -->
  <div class="bg-black border border-green-500 p-4 rounded-lg shadow-lg">

    <div class="flex items-center mb-2">
      <span class="mr-2">></span>
      <input id="title" placeholder="challenge_name"
        class="bg-black outline-none w-full text-green-400">
    </div>

    <div class="flex items-center mb-2">
      <span class="mr-2">></span>
      <input id="category" placeholder="category (web/pwn/crypto)"
        class="bg-black outline-none w-full text-green-400">
    </div>

    <div class="flex items-start mb-2">
      <span class="mr-2">></span>
      <textarea id="content" rows="5"
        placeholder="writeup details..."
        class="bg-black outline-none w-full text-green-400 resize-none"></textarea>
    </div>

    <button onclick="addPost()"
      class="mt-3 border border-green-500 px-4 py-1 hover:bg-green-500 hover:text-black transition">
      EXECUTE
    </button>

  </div>

  <!-- Output -->
  <div id="terminalOutput" class="mt-6 space-y-4"></div>

</div>

<script>
let posts = JSON.parse(localStorage.getItem("ctf_posts")) || [];

function typeEffect(element, text, speed = 10) {
  let i = 0;
  element.innerHTML = "";

  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

function addPost() {
  const title = document.getElementById("title").value;
  const category = document.getElementById("category").value;
  const content = document.getElementById("content").value;

  if (!title || !content) {
    alert("Missing input.");
    return;
  }

  const post = {
    id: Date.now(),
    title,
    category,
    content
  };

  posts.unshift(post);
  localStorage.setItem("ctf_posts", JSON.stringify(posts));

  renderPosts();

  document.getElementById("title").value = "";
  document.getElementById("category").value = "";
  document.getElementById("content").value = "";
}

function renderPosts() {
  const container = document.getElementById("terminalOutput");
  container.innerHTML = "";

  posts.forEach(post => {
    const wrapper = document.createElement("div");
    wrapper.className = "border border-green-500 p-4 rounded";

    const titleEl = document.createElement("div");
    const contentEl = document.createElement("pre");

    titleEl.className = "font-bold text-green-300";
    contentEl.className = "whitespace-pre-wrap mt-2";

    wrapper.innerHTML = `
      <div>> ${post.title} <span class="text-green-600">[${post.category}]</span></div>
      <pre class="whitespace-pre-wrap mt-2" id="content-${post.id}"></pre>

      <div class="mt-3 flex gap-3 text-sm">
        <button onclick="copyPost(${post.id})" class="hover:text-white">[copy]</button>
        <button onclick="deletePost(${post.id})" class="hover:text-red-400">[delete]</button>
      </div>
    `;

    container.appendChild(wrapper);

    const contentBox = document.getElementById(`content-${post.id}`);
    typeEffect(contentBox, post.content);
  });
}

function deletePost(id) {
  posts = posts.filter(p => p.id !== id);
  localStorage.setItem("ctf_posts", JSON.stringify(posts));
  renderPosts();
}

function copyPost(id) {
  const post = posts.find(p => p.id === id);
  navigator.clipboard.writeText(post.content);
  alert("Copied to clipboard.");
}

renderPosts();
</script>

</body>
</html>
