<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kali CTF Terminal</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Highlight.js -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>

<style>
body { font-family: monospace; }
</style>
</head>

<body class="bg-black text-green-400 min-h-screen">

<div class="max-w-5xl mx-auto p-6">

  <div class="mb-4">
    <h1 class="text-xl">kali@ctf:~$ personal writeup terminal</h1>
    <p class="text-green-600 text-sm">type "help"</p>
  </div>

  <!-- Terminal Output -->
  <div id="output" class="space-y-4 mb-4"></div>

  <!-- Input -->
  <div class="flex items-center">
    <span class="mr-2">kali@ctf:~$</span>
    <input id="cmd" autofocus
      class="bg-black outline-none w-full text-green-400"
      onkeydown="handleCommand(event)">
  </div>

</div>

<script>
let posts = JSON.parse(localStorage.getItem("ctf_posts")) || [];

function print(text, isHTML = false) {
  const out = document.getElementById("output");
  const div = document.createElement("div");

  if (isHTML) div.innerHTML = text;
  else div.innerText = text;

  out.appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
}

function handleCommand(e) {
  if (e.key !== "Enter") return;

  const input = e.target.value.trim();
  print("kali@ctf:~$ " + input);

  const args = input.split(" ");
  const cmd = args[0];

  switch(cmd) {
    case "help":
      print(`
Commands:
- post        : create new writeup
- list        : list all writeups
- view [id]   : view writeup
- delete [id] : delete writeup
- clear       : clear screen
      `);
      break;

    case "post":
      createPost();
      break;

    case "list":
      listPosts();
      break;

    case "view":
      viewPost(args[1]);
      break;

    case "delete":
      deletePost(args[1]);
      break;

    case "clear":
      document.getElementById("output").innerHTML = "";
      break;

    default:
      print("command not found");
  }

  e.target.value = "";
}

function createPost() {
  const title = prompt("Title:");
  const category = prompt("Category:");
  const content = prompt("Markdown content:");

  if (!title || !content) return;

  const post = {
    id: Date.now(),
    title,
    category,
    content
  };

  posts.unshift(post);
  localStorage.setItem("ctf_posts", JSON.stringify(posts));

  print("✔ writeup saved");
}

function listPosts() {
  if (posts.length === 0) {
    print("no writeups");
    return;
  }

  posts.forEach(p => {
    print(`${p.id} - ${p.title} [${p.category}]`);
  });
}

function viewPost(id) {
  const post = posts.find(p => p.id == id);
  if (!post) {
    print("not found");
    return;
  }

  let html = `
    <div class="border border-green-500 p-4 rounded mt-2">
      <h2 class="text-green-300 text-lg">${post.title}</h2>
      <div class="text-green-600 mb-2">${post.category}</div>
      <div class="prose prose-invert max-w-none">${marked.parse(post.content)}</div>
    </div>
  `;

  print(html, true);

  setTimeout(() => {
    document.querySelectorAll("pre code").forEach(block => {
      hljs.highlightElement(block);
    });
  }, 0);
}

function deletePost(id) {
  posts = posts.filter(p => p.id != id);
  localStorage.setItem("ctf_posts", JSON.stringify(posts));
  print("deleted");
}
</script>

</body>
</html>
