<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CTF Reverse Terminal</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Highlight.js -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>

<style>
body { font-family: monospace; }
</style>
</head>

<body class="bg-black text-green-400 min-h-screen">

<div class="max-w-5xl mx-auto p-6">

  <div class="mb-4">
    <h1 class="text-lg font-bold">REVERSE ENGINEERING TERMINAL</h1>
    <p class="text-green-600 text-sm">type "help"</p>
  </div>

  <!-- Output -->
  <div id="output" class="space-y-2 mb-4"></div>

  <!-- Input -->
  <div class="flex items-center">
    <span id="prompt" class="mr-2">kali@ctf:~/reverse$</span>
    <input id="cmd"
      class="bg-black outline-none w-full text-green-400"
      onkeydown="handleCommand(event)">
  </div>

</div>

<script>
let path = ["reverse"];

function print(text, html=false) {
  const out = document.getElementById("output");
  const div = document.createElement("div");
  div.innerHTML = html ? text : text;
  out.appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
}

function updatePrompt() {
  document.getElementById("prompt").innerText =
    `kali@ctf:~/${path.slice(1).join("/") || ""}$`;
}

function getPath() {
  return path.join("/");
}

/* =========================
   COMMANDS
========================= */
async function handleCommand(e) {
  if (e.key !== "Enter") return;

  const input = e.target.value.trim();
  print("kali@ctf$ " + input);

  const args = input.split(" ");
  const cmd = args[0];

  switch(cmd) {

    case "help":
      print(`
Commands:
ls
cd [folder]
view [file]
clear
`);
      break;

    case "ls":
      await ls();
      break;

    case "cd":
      cd(args[1]);
      break;

    case "view":
      await view(args[1]);
      break;

    case "clear":
      document.getElementById("output").innerHTML = "";
      break;

    default:
      print("command not found");
  }

  e.target.value = "";
}

/* =========================
   FILE SYSTEM (SAME REPO)
========================= */
async function ls() {
  const url = `https://api.github.com/repos/${location.hostname.split('.')[0]}/${location.hostname.split('.')[0]}.github.io/contents/${getPath()}`;

  const res = await fetch(url);
  const data = await res.json();

  if (!Array.isArray(data)) {
    print("invalid path");
    return;
  }

  let out = "";

  data.forEach(item => {
    if (item.type === "dir") {
      out += `<span class="text-blue-400">[${item.name}]</span> `;
    } else if (item.name.endsWith(".md")) {
      out += item.name.replace(".md", "") + " ";
    }
  });

  print(out, true);
}

function cd(dir) {
  if (!dir) return;

  if (dir === "..") {
    if (path.length > 1) path.pop();
  } else {
    path.push(dir);
  }

  updatePrompt();
}

/* =========================
   VIEW FILE
========================= */
async function view(file) {
  if (!file) return;

  const repo = location.hostname.split('.')[0] + ".github.io";

  const url =
    `https://raw.githubusercontent.com/${location.hostname.split('.')[0]}/${repo}/main/${getPath()}/${file}.md`;

  const res = await fetch(url);

  if (!res.ok) {
    print("file not found");
    return;
  }

  const md = await res.text();

  const html = `
    <div class="border border-green-500 p-4 rounded mt-2">
      ${marked.parse(md)}
    </div>
  `;

  print(html, true);

  setTimeout(() => {
    document.querySelectorAll("pre code").forEach(b => {
      hljs.highlightElement(b);
    });
  }, 0);
}

/* init */
updatePrompt();
</script>

</body>
</html>
