<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CTF Terminal OS</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>

<style>
body { font-family: monospace; }
</style>
</head>

<body class="bg-black min-h-screen">

<div class="max-w-5xl mx-auto p-6">

  <!-- HEADER -->
  <div class="mb-4">
    <h1 class="text-lg font-bold text-purple-400">CTF LINUX REVERSE TERMINAL</h1>
    <p class="text-gray-400 text-sm">TAB autocomplete | ↑↓ history | help</p>
  </div>

  <!-- OUTPUT -->
  <div id="output" class="space-y-2 mb-4"></div>

  <!-- INPUT -->
  <div class="flex items-center">
    <span id="prompt" class="mr-2 text-purple-400">kali@ctf:~/reverse$</span>
    <input id="cmd"
      class="bg-black outline-none w-full text-green-400"
      onkeydown="handleKey(event)">
  </div>

</div>

<script>
let path = ["reverse"];
let history = [];
let historyIndex = -1;

const commands = ["ls", "cd", "view", "cat", "tree", "clear", "help"];

/* =========================
   PRINT SYSTEM (COLOR CORE)
========================= */
function print(text, type="normal") {
  const out = document.getElementById("output");
  const div = document.createElement("div");

  const colors = {
    normal: "text-gray-300",
    success: "text-green-400",
    error: "text-red-400",
    folder: "text-blue-400",
    command: "text-yellow-300",
    system: "text-purple-400"
  };

  div.className = colors[type] || colors.normal;
  div.innerHTML = text;

  out.appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
}

/* =========================
   PROMPT
========================= */
function updatePrompt() {
  document.getElementById("prompt").innerText =
    `kali@ctf:~/${path.slice(1).join("/") || ""}$`;
}

function getPath() {
  return path.join("/");
}

/* =========================
   FETCH DIR
========================= */
async function fetchDir() {
  const user = location.hostname.split('.')[0];
  const repo = user + ".github.io";

  const url =
    `https://api.github.com/repos/${user}/${repo}/contents/${getPath()}`;

  const res = await fetch(url);
  const data = await res.json();

  if (!Array.isArray(data)) return [];

  return data;
}

/* =========================
   LS (BLUE FOLDERS)
========================= */
async function ls() {
  const data = await fetchDir();

  if (!data.length) {
    print("empty directory", "error");
    return;
  }

  let out = "";

  data.forEach(item => {
    if (item.type === "dir") {
      out += `<span class="text-blue-400">[${item.name}]</span> `;
    } else {
      out += `<span class="text-gray-300">${item.name.replace(".md","")}</span> `;
    }
  });

  print(out);
}

/* =========================
   CD
========================= */
function cd(dir) {
  if (!dir) return;

  if (dir === "..") {
    if (path.length > 1) path.pop();
  } else {
    path.push(dir);
  }

  updatePrompt();
  print(`changed directory: ${getPath()}`, "system");
}

/* =========================
   TREE
========================= */
async function tree() {
  const data = await fetchDir();

  data.forEach(item => {
    if (item.type === "dir") {
      print("├── " + item.name, "folder");
    } else {
      print("├── " + item.name);
    }
  });
}

/* =========================
   CAT (RAW)
========================= */
async function cat(file) {
  const user = location.hostname.split('.')[0];
  const repo = user + ".github.io";

  const url =
    `https://raw.githubusercontent.com/${user}/${repo}/main/${getPath()}/${file}.md`;

  const res = await fetch(url);

  if (!res.ok) {
    print("file not found", "error");
    return;
  }

  const md = await res.text();
  print(`<pre class="text-gray-300 whitespace-pre-wrap">${md}</pre>`, "normal");
}

/* =========================
   VIEW (MARKDOWN)
========================= */
async function view(file) {
  const user = location.hostname.split('.')[0];
  const repo = user + ".github.io";

  const url =
    `https://raw.githubusercontent.com/${user}/${repo}/main/${getPath()}/${file}.md`;

  const res = await fetch(url);

  if (!res.ok) {
    print("file not found", "error");
    return;
  }

  const md = marked.parse(await res.text());

  print(`
    <div class="border border-purple-500 p-4 rounded">
      ${md}
    </div>
  `);

  setTimeout(() => {
    document.querySelectorAll("pre code").forEach(b => {
      hljs.highlightElement(b);
    });
  }, 0);
}

/* =========================
   AUTOCOMPLETE
========================= */
async function autocomplete(input) {
  const value = input.value.trim();
  const parts = value.split(" ");
  const cmd = parts[0];

  if (parts.length === 1) {
    const match = commands.filter(c => c.startsWith(cmd));

    if (match.length === 1) {
      input.value = match[0] + " ";
    } else if (match.length > 1) {
      print(match.join("   "), "system");
    }
    return;
  }

  const items = await fetchDir();
  const names = items.map(i => i.name.replace(".md",""));
  const arg = parts[1] || "";

  const match = names.filter(n => n.startsWith(arg));

  if (match.length === 1) {
    parts[1] = match[0];
    input.value = parts.join(" ");
  } else if (match.length > 1) {
    print(match.join("   "), "system");
  }
}

/* =========================
   KEY HANDLER
========================= */
async function handleKey(e) {

  if (e.key === "Tab") {
    e.preventDefault();
    autocomplete(e.target);
    return;
  }

  if (e.key === "ArrowUp") {
    if (!history.length) return;
    historyIndex = Math.max(0, historyIndex - 1);
    e.target.value = history[historyIndex] || "";
    return;
  }

  if (e.key === "ArrowDown") {
    if (!history.length) return;
    historyIndex = Math.min(history.length - 1, historyIndex + 1);
    e.target.value = history[historyIndex] || "";
    return;
  }

  if (e.key !== "Enter") return;

  const input = e.target.value.trim();

  print("kali@ctf$ " + input, "command");

  history.push(input);
  historyIndex = history.length;

  const args = input.split(" ");
  const cmd = args[0];

  switch(cmd) {

    case "help":
      print(`
<span class="text-yellow-300">Commands:</span><br>
ls, cd, view, cat, tree, clear
`);
      break;

    case "ls":
      await ls();
      break;

    case "cd":
      cd(args[1]);
      break;

    case "view":
      await view(args[1]);
      break;

    case "cat":
      await cat(args[1]);
      break;

    case "tree":
      await tree();
      break;

    case "clear":
      document.getElementById("output").innerHTML = "";
      break;

    default:
      print("command not found", "error");
  }

  e.target.value = "";
}

/* INIT */
updatePrompt();
</script>

</body>
</html>
