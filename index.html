<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap');

body { font-family: 'Fira Code', monospace; }

/* Scrollbar Styling */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #000000; }
::-webkit-scrollbar-thumb { background: #ff0000; border-radius: 4px; box-shadow: 0 0 10px #ff0000; }
::-webkit-scrollbar-thumb:hover { background: #ff4444; box-shadow: 0 0 15px #ff4444; }

/* Modal Scrollbar */
.modal-scroll::-webkit-scrollbar { width: 10px; }
.modal-scroll::-webkit-scrollbar-track { background: #0a0a0a; }
.modal-scroll::-webkit-scrollbar-thumb { background: #00ffff; border-radius: 4px; box-shadow: 0 0 10px rgba(0, 255, 255, 0.5); }
.modal-scroll::-webkit-scrollbar-thumb:hover { background: #00cccc; box-shadow: 0 0 15px rgba(0, 255, 255, 0.8); }

/* CRT Scanline Effect */
.scanlines {
  background: linear-gradient(rgba(255, 0, 0, 0.03) 50%, rgba(0, 0, 0, 0.5) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(255, 50, 50, 0.03), rgba(255, 100, 100, 0.03));
  background-size: 100% 2px, 3px 100%;
  pointer-events: none;
}

/* Blinking Cursor */
.cursor-blink { animation: blink 1s step-end infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* Modal Animations */
@keyframes modalOpen {
  0% { opacity: 0; transform: scale(0.95); }
  100% { opacity: 1; transform: scale(1); }
}
.modal-animate { animation: modalOpen 0.2s ease-out; }

/* Glitch Effect for Header */
.glitch-text {
  position: relative;
}
.glitch-text::before,
.glitch-text::after {
  content: attr(data-text);
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}
.glitch-text::before {
  left: 2px;
  text-shadow: -1px 0 #ff00ff;
  clip: rect(24px, 550px, 90px, 0);
  animation: glitch-anim-1 3s infinite linear alternate-reverse;
}
.glitch-text::after {
  left: -2px;
  text-shadow: -1px 0 #00ffff;
  clip: rect(85px, 550px, 140px, 0);
  animation: glitch-anim-2 2.5s infinite linear alternate-reverse;
}
@keyframes glitch-anim-1 {
  0% { clip: rect(20px, 9999px, 15px, 0); }
  100% { clip: rect(95px, 9999px, 100px, 0); }
}
@keyframes glitch-anim-2 {
  0% { clip: rect(120px, 9999px, 125px, 0); }
  100% { clip: rect(5px, 9999px, 10px, 0); }
}

/* Modal Scroll Container */
.modal-scroll {
  overscroll-behavior: contain;
}

/* ==================== CUSTOM MARKED RENDERER STYLES ==================== */
.prose {
  color: #00ff41;
  max-width: none;
}
.prose h1, .prose h2, .prose h3, .prose h4, .prose h5, .prose h6 {
  font-weight: bold;
  margin-top: 0.5em;
  margin-bottom: 0.25em;
  text-shadow: 0 0 10px #ff00ff;
  border-bottom: 1px solid rgba(255, 0, 255, 0.3);
  padding-bottom: 0.2em;
}
.prose h1 { font-size: 1.75em; color: #ff00ff; }
.prose h2 { font-size: 1.45em; color: #00ffff; }
.prose h3 { font-size: 1.25em; color: #00ff41; }
.prose h4 { font-size: 1.1em; color: #ffff00; }
.prose h5 { font-size: 1em; color: #ff9900; }
.prose h6 { font-size: 0.95em; color: #ff6600; }

.prose pre {
  background-color: #0d0d0d;
  border: 1px solid #0088ff;
  border-radius: 0.4em;
  padding: 1em;
  overflow-x: auto;
  margin: 0.8em 0;
  box-shadow: inset 0 0 20px rgba(0, 136, 255, 0.1), 0 0 10px rgba(0, 136, 255, 0.2);
  position: relative;
}
.prose pre::before {
  content: attr(data-lang);
  position: absolute;
  top: 0;
  right: 0;
  background: #0088ff;
  color: #000;
  font-size: 0.7em;
  padding: 0.2em 0.6em;
  border-bottom-left-radius: 0.4em;
  font-weight: bold;
  opacity: 0.9;
}
.prose code:not(pre code) {
  background-color: rgba(0, 255, 255, 0.1);
  color: #00ffff;
  padding: 0.15em 0.4em;
  border-radius: 0.2em;
  font-size: 0.9em;
  border: 1px solid rgba(0, 255, 255, 0.3);
  text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
}
.prose pre code {
  background-color: transparent;
  color: #00ff41;
  padding: 0;
  border: none;
  font-size: 0.9em;

}
.prose a {

}

.prose img {

.prose blockquote {

}
</style>

<script>
/* =========================
   CONFIGURATION
========================= */
const CONFIG = {
  USER: "reverse101",
  HOST: "localhost",
};

/* =========================
   CUSTOM MARKED RENDERER
========================= */
const renderer = new marked.Renderer();

renderer.heading = function(text, level) {
  const colors = { 1: '#ff00ff', 2: '#00ffff', 3: '#00ff41', 4: '#ffff00', 5: '#ff9900', 6: '#ff6600' };
  return `<h${level} style="color:${colors[level] || '#ff00ff'}; text-shadow: 0 0 12px ${colors[level] || '#ff00ff'};">
            ${text}
          </h${level}>`;
};

renderer.code = function(code, infostring) {
  const lang = (infostring || '').split(' ')[0] || 'text';
  return `<pre data-lang="${lang.toUpperCase()}"><code class="language-${lang}">${code}</code></pre>`;
};

renderer.codespan = function(text) {
  return `<code class="inline-code">${text}</code>`;
};

renderer.link = function(href, title, text) {
  return `<a href="${href}" target="_blank" rel="noopener noreferrer" 
             title="${title || ''}" 
             style="color:#ff6600; border-bottom:1px dotted #ff6600; text-shadow:0 0 6px #ff6600;">
            ${text}
          </a>`;
};

renderer.image = function(href, title, text) {
  return `<img src="${href}" alt="${text}" title="${title || ''}" 
               style="max-width:100%; border:2px solid #00ffff; border-radius:4px; 
                      box-shadow:0 0 25px rgba(0,255,255,0.6); transition:all 0.3s;"
               onload="this.style.opacity=1" />`;
};

renderer.blockquote = function(quote) {
  return `<blockquote style="border-left:4px solid #ff00ff; padding-left:1.2em; margin:1em 0; 
                            color:#ff9900; background:rgba(255,0,255,0.08); border-radius:0 6px 6px 0;">
            ${quote}
          </blockquote>`;
};

marked.use({ renderer });

marked.setOptions({
  gfm: true,
  breaks: true,
  pedantic: false,
  smartypants: true,
  headerIds: false,
  mangle: false
});

/* =========================
   VIRTUAL FILE SYSTEM
========================= */
async function loadFileSystem() {
  const fs = {};
  try {
    const manifestRes = await fetch('manifest.json');
    if (!manifestRes.ok) throw new Error(`Manifest fetch failed: ${manifestRes.status}`);
    const manifest = await manifestRes.json();
    
    if (manifest.directories) {
      manifest.directories.forEach(dir => { if (!fs[dir]) fs[dir] = {}; });
    }
    
    const structure = manifest.structure || {};
    for (const [dir, files] of Object.entries(structure)) {
      if (!fs[dir]) fs[dir] = {};
      if (Array.isArray(files)) {
        for (const filename of files) {
          if (!filename) continue;
          const url = `reverse/${dir}/${filename}`;
          try {
            const res = await fetch(url);
            fs[dir][filename] = res.ok ? await res.text() : `[ERROR] File not found: ${url}`;
          } catch (e) {
            fs[dir][filename] = `[ERROR] Failed to load: ${url}`;
          }
        }
      }
    }
  } catch (e) {
    console.error('Failed to load manifest:', e);
    print(`<span class="text-red-500">ERROR: Could not load file system. Check console.</span>`, "error");
  }
  return { reverse: fs };
}

/* =========================
   STATE + PATH HELPERS
========================= */
let shellState = {
  path: [],
  history: [],
  historyIndex: -1,
  completion: { input: '', matches: [], index: 0 }
};

let fileSystem = {};
let currentFileContent = "";

function resolvePathToTarget(pathStr) {
  if (!pathStr) return null;
  let current;
  const parts = pathStr.split('/').filter(p => p !== '');
  if (pathStr.startsWith('/')) {
    current = fileSystem;
  } else {
    current = getCurrentDirObj();
  }
  if (!current) return null;
  for (let i = 0; i < parts.length - 1; i++) {
    const part = parts[i];
    if (current[part] && typeof current[part] === 'object') current = current[part];
    else return null;
  }
  const targetName = parts[parts.length - 1];
  return current.hasOwnProperty(targetName) ? current[targetName] : null;
}

function getCurrentDirObj() {
  let current = fileSystem["reverse"];
  if (!current) return null;
  for (const segment of shellState.path) {
    if (current[segment] && typeof current[segment] === 'object') current = current[segment];
    else return null;
  }
  return current;
}

/* =========================
   CORE FUNCTIONS
========================= */
function print(text, type = "normal") {
  const output = document.getElementById("output");
  const div = document.createElement("div");
  const typeClasses = {
    normal: "text-red-600",
    success: "text-green-400 font-semibold",
    error: "text-magenta-500 font-bold",
    system: "text-yellow-500 italic text-sm",
    info: "text-cyan-400",
    command: "text-green-400 font-semibold",
    dir: "text-cyan-400 font-bold",
    file: "text-yellow-400",
    raw: "text-red-600"
  };
  div.className = typeClasses[type] || typeClasses.normal;
  div.innerHTML = text;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function updatePrompt() {
  const fullPath = shellState.path.join("/");
  const displayPath = fullPath === "" ? "/reverse" : `/reverse/${fullPath}`;
  const promptHTML = `<span class="text-cyan-400" style="text-shadow: 0 0 8px #00ffff;">${CONFIG.USER}</span><span class="text-green-600">@</span><span class="text-magenta-500" style="text-shadow: 0 0 8px #ff00ff;">${CONFIG.HOST}</span><span class="text-cyan-600"> in </span><span class="text-yellow-400" style="text-shadow: 0 0 8px #ffff00;">${displayPath}</span><span class="text-green-400" style="text-shadow: 0 0 8px #00ff41;"> ❯ </span>`;
  document.getElementById("prompt").innerHTML = promptHTML;
}

/* =========================
   COMMANDS
========================= */
const commands = {
  help: () => {
    const helpText = `
<span class="text-green-400 font-bold">AVAILABLE COMMANDS:</span>
  <span class="text-cyan-400">ls [dir]</span>          List directory contents
  <span class="text-cyan-400">cd [dir]</span>          Change directory
  <span class="text-cyan-400">pwd</span>               Print working directory
  <span class="text-cyan-400">cat [file]</span>        View raw file content
  <span class="text-cyan-400">view [file]</span>       View file (Markdown supported)
  <span class="text-cyan-400">echo [text]</span>       Print text
  <span class="text-cyan-400">date</span>              Show current date/time
  <span class="text-cyan-400">uname [-a]</span>        System information
  <span class="text-cyan-400">neofetch</span>          System info with logo
  <span class="text-cyan-400">clear</span>             Clear terminal
  <span class="text-cyan-400">whoami</span>            Print current user
  <span class="text-cyan-400">tree [dir]</span>        Show directory tree
  <span class="text-cyan-400">find [pattern]</span>    Find files by name
  <span class="text-cyan-400">history [-c]</span>      Show/clear command history
  <span class="text-yellow-400">Ctrl+C</span>            Interrupt/kill current input
`;
    print(helpText);
  },

  clear: () => { document.getElementById('output').innerHTML = ""; },

  whoami: () => { print(CONFIG.USER, "success"); },

  pwd: () => {
    const p = shellState.path.join("/");
    print(p ? `/reverse/${p}` : "/reverse", "info");
  },

  echo: (...args) => { print(args.join(" "), "normal"); },

  date: () => { print(new Date().toString(), "info"); },

  uname: (...args) => {
    if (args.includes("-a")) {
      print("Linux thatnoteasy 6.1.0-generic x86_64 GNU/Linux", "info");
    } else {
      print("Linux", "info");
    }
  },

  neofetch: () => {
    const ascii = `
<span class="text-green-400" style="text-shadow: 0 0 8px #00ff41;">
        .-''''-.
      .'  _  '.  
     /   (o)o  \\
    |   '._.'   |
     '.        .'
       '-....-'
</span>
<span class="text-green-400" style="text-shadow: 0 0 5px rgba(0, 255, 65, 0.3);">
  thatnoteasy@localhost
  ---------------
  OS: thatnoteasy.github.io
  Host: Web Terminal
  Kernel: JavaScript
  Shell: bash (custom)
  Terminal: Browser
  CPU: Web Assembly
  Memory: Infinite
</span>`;
    print(ascii);
  },

  ls: (dir) => {
    let targetDir;
    if (dir) {
      targetDir = resolvePath(dir);
      if (!targetDir) {
        print(`ls: cannot access '${dir}': No such directory`, "error");
        return;
      }
    } else {
      targetDir = getCurrentDirObj();
    }
    if (!targetDir) return print("Error: Directory corrupted", "error");

    const items = Object.keys(targetDir);
    if (items.length === 0) {
      print("(empty directory)", "system");
      return;
    }

    let out = '<div class="flex flex-wrap gap-x-4 gap-y-1">';
    items.forEach(name => {
      const isDir = typeof targetDir[name] === 'object';
      const icon = isDir ? "📁" : "📄";
      const colorClass = isDir ? "text-cyan-400 font-bold" : "text-yellow-400";
      out += `<span class="${colorClass}" style="${isDir ? 'text-shadow: 0 0 8px #00ffff;' : 'text-shadow: 0 0 8px #ffff00;'}">${icon} ${name}</span>`;
    });
    out += '</div>';
    print(out);
  },

  cd: (dir) => {
    if (!dir || dir === "~" || dir === "/") {
      shellState.path = [];
    } else if (dir === "..") {
      if (shellState.path.length > 0) shellState.path.pop();
    } else if (dir.startsWith('/')) {
      const parts = dir.split('/').filter(p => p !== '');
      let current = fileSystem;
      const newPath = [];
      for (const part of parts) {
        if (current[part] && typeof current[part] === 'object') {
          current = current[part];
          newPath.push(part);
        } else {
          print(`bash: cd: ${dir}: No such file or directory`, "error");
          return;
        }
      }
      shellState.path = newPath;
    } else {
      const currentDir = getCurrentDirObj();
      const cleanDir = dir.replace(/\/$/, '');
      if (currentDir[cleanDir] && typeof currentDir[cleanDir] === 'object') {
        shellState.path.push(cleanDir);
      } else {
        print(`bash: cd: ${dir}: No such file or directory`, "error");
        return;
      }
    }
    updatePrompt();
  },

  cat: async (file) => {
    if (!file) {
      print("usage: cat [filename]", "info");
      return;
    }
    const target = resolvePathToTarget(file);
    if (target === null) {
      print(`cat: ${file}: No such file or directory`, "error");
    } else if (typeof target === 'object') {
      print(`cat: ${file}: Is a directory`, "error");
    } else {
      const safeContent = target.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      print(`<pre class="text-yellow-400 whitespace-pre-wrap font-mono text-xs" style="text-shadow: 0 0 5px rgba(255, 255, 0, 0.3);">${safeContent}</pre>`, "raw");
    }
  },

  view: async (file) => {
    if (!file) {
      print("usage: view [filename]", "info");
      return;
    }
    const target = resolvePathToTarget(file);
    if (target === null) {
      print(`view: ${file}: No such file or directory`, "error");
      return;
    }
    if (typeof target === 'object') {
      print(`view: ${file}: Is a directory`, "error");
      return;
    }

    const content = target;
    currentFileContent = content;

    const displayName = file.split('/').pop();
    const ext = displayName.includes('.') ? displayName.split('.').pop().toLowerCase() : 'txt';
    const icon = (ext === 'md' || ext === 'markdown') ? '📝' : '📄';

    const fileSize = (content.length / 1024).toFixed(2);

    document.getElementById('modal-title').textContent = displayName;
    document.getElementById('modal-title').setAttribute('data-text', displayName);
    document.getElementById('modal-icon').textContent = icon;
    document.getElementById('modal-ext-badge').textContent = `.${ext}`;
    document.getElementById('modal-path').textContent = shellState.path.length > 0 
      ? `/reverse/${shellState.path.join("/")}/${file}` 
      : `/reverse/${file}`;
    document.getElementById('modal-size').textContent = `${fileSize} KB`;

    // CUSTOM RENDERER
    const html = marked.parse(content);
    document.getElementById('modal-content').innerHTML = html;

    // Raw view + line numbers
    document.getElementById('modal-raw-pre').textContent = content;
    const linesCount = content.split('\n').length;
    document.getElementById('raw-line-numbers').innerHTML = Array.from(
      { length: linesCount }, (_, i) => `<span class="block">${i + 1}</span>`
    ).join('');

    // Stats
    const words = content.trim().split(/\s+/).length;
    document.getElementById('file-stats').innerHTML = `
      <span>Lines: <span class="text-cyan-400">${linesCount}</span></span>
      <span class="text-cyan-700">•</span>
      <span>Words: <span class="text-cyan-400">${words}</span></span>
    `;

    document.getElementById('modal-content').classList.remove('hidden');
    document.getElementById('modal-raw').classList.add('hidden');
    document.getElementById('modal-status').textContent = 'READY • RENDERED';

    setTimeout(() => {
      document.querySelectorAll('#modal-content pre code').forEach((block) => {
        hljs.highlightElement(block);
      });
    }, 10);

    document.getElementById('file-modal').classList.remove('hidden');
    print(`[View] Opening <span class="text-yellow-400">${displayName}</span>...`, "info");
  },

  tree: (dir = ".") => {
    const currentDir = dir === "." ? getCurrentDirObj() : fileSystem;
    const lines = [];
    const buildTree = (obj, prefix = "", isLast = true) => {
      const keys = Object.keys(obj).sort();
      keys.forEach((key, idx) => {
        const isLastItem = idx === keys.length - 1;
        const isDir = typeof obj[key] === 'object';
        const connector = isLastItem ? "└── " : "├── ";
        const line = prefix + connector + key;
        const className = isDir ? 'text-cyan-400 font-semibold' : 'text-yellow-400';
        const style = isDir ? 'text-shadow: 0 0 8px #00ffff;' : 'text-shadow: 0 0 8px #ffff00;';
        lines.push(`<span class="${className}" style="${style}">${line}</span>`);
        if (isDir) {
          const newPrefix = prefix + (isLastItem ? "    " : "│   ");
          buildTree(obj[key], newPrefix, isLastItem);
        }
      });
    };
    buildTree(currentDir);
    if (lines.length === 0) {
      print("(empty)", "system");
    } else {
      print(lines.join('<br>'), "raw");
    }
  },

  find: (pattern) => {
    if (!pattern) {
      print("usage: find [pattern]", "info");
      return;
    }
    const results = [];
    const search = (obj, path = "") => {
      for (const key in obj) {
        const currentPath = path ? path + "/" + key : key;
        if (key.includes(pattern)) {
          const isDir = typeof obj[key] === 'object';
          results.push({ name: currentPath, isDir });
        }
        if (typeof obj[key] === 'object') search(obj[key], currentPath);
      }
    };
    search(fileSystem);
    if (results.length === 0) {
      print(`find: No files matching '${pattern}'`, "error");
    } else {
      results.forEach(r => {
        const color = r.isDir ? "text-cyan-400 font-semibold" : "text-yellow-400";
        print(`<span class="${color}" style="${r.isDir ? 'text-shadow: 0 0 8px #00ffff;' : 'text-shadow: 0 0 8px #ffff00;'}">${r.name}${r.isDir ? '/' : ''}</span>`);
      });
    }
  },

  history: (...args) => {
    if (args.includes("-c")) {
      shellState.history = [];
      shellState.historyIndex = -1;
      print("History cleared", "success");
    } else if (shellState.history.length === 0) {
      print("No history", "system");
    } else {
      shellState.history.forEach((cmd, i) => {
        print(`  ${i + 1}  ${cmd}`, "normal");
      });
    }
  }
};

/* =========================
   MODAL FUNCTIONS
========================= */
function closeFileModal() {
  document.getElementById('file-modal').classList.add('hidden');
  currentFileContent = "";
  document.getElementById('modal-content').classList.remove('hidden');
  document.getElementById('modal-raw').classList.add('hidden');
}

function toggleRawView() {
  const rendered = document.getElementById('modal-content');
  const raw = document.getElementById('modal-raw');
  const isCurrentlyRaw = !raw.classList.contains('hidden');

  if (isCurrentlyRaw) {
    raw.classList.add('hidden');
    rendered.classList.remove('hidden');
    document.getElementById('modal-status').textContent = 'READY • RENDERED';
    document.getElementById('raw-btn-text').textContent = 'Raw';
    document.getElementById('view-mode-icon').textContent = '🔍';
  } else {
    rendered.classList.add('hidden');
    raw.classList.remove('hidden');
    document.getElementById('modal-status').textContent = 'READY • RAW';
    document.getElementById('raw-btn-text').textContent = 'Rendered';
    document.getElementById('view-mode-icon').textContent = '📜';
  }
}

function copyModalContent() {
  if (!currentFileContent) return;
  navigator.clipboard.writeText(currentFileContent).then(() => {
    print("✓ Raw content copied to clipboard!", "success");
  }).catch(() => {
    print("❌ Failed to copy", "error");
  });
}

function downloadCurrentFile() {
  if (!currentFileContent) return;
  const title = document.getElementById('modal-title').textContent || 'writeup';
  const ext = document.getElementById('modal-ext-badge').textContent.replace('.', '') || 'md';
  const filename = `${title}.${ext}`;

  const blob = new Blob([currentFileContent], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);

  print(`⬇️ Downloaded <span class="text-emerald-400">${filename}</span>`, "success");
}

/* =========================
   KEYBOARD HANDLER
========================= */
function handleKey(e) {
  const inputField = document.getElementById("cmd");

  if (e.key === "Tab") {
    e.preventDefault();
    const input = inputField.value;
    const cursorPos = inputField.selectionStart;
    const beforeCursor = input.slice(0, cursorPos);
    const afterCursor = input.slice(cursorPos);
    const words = beforeCursor.split(/\s+/);
    const lastWord = words[words.length - 1] || '';
    
    const isCmdPosition = words.length === 1 && beforeCursor.trim() === lastWord;
    const cmd = words[0]?.toLowerCase();
    const isPathArg = words.length === 2 && ["cat", "view", "cd", "tree", "find", "ls"].includes(cmd);
    
    let matches = [];
    let completionType = 'cmd';
    
    if (isCmdPosition) {
      const cmds = Object.keys(commands);
      matches = cmds.filter(c => c.toLowerCase().startsWith(lastWord.toLowerCase()));
      completionType = 'cmd';
    } else if (isPathArg) {
      let currentDir = getCurrentDirObj();
      let searchPath = lastWord;
      const pathParts = searchPath.split("/");
      const partialName = pathParts.pop();
      
      if (pathParts.length > 0 && pathParts[0] !== "") {
        let tempDir = currentDir;
        for (const p of pathParts) {
          const dirKey = Object.keys(tempDir).find(k => k.toLowerCase() === p.toLowerCase() && typeof tempDir[k] === 'object');
          if (dirKey) {
            tempDir = tempDir[dirKey];
          } else {
            tempDir = null;
            break;
          }
        }
        if (tempDir) currentDir = tempDir;
      } else if (pathParts.length > 0 && pathParts[0] === "") {
        let tempDir = fileSystem;
        for (let i = 1; i < pathParts.length; i++) {
          const p = pathParts[i];
          const dirKey = Object.keys(tempDir).find(k => k.toLowerCase() === p.toLowerCase() && typeof tempDir[k] === 'object');
          if (dirKey) {
            tempDir = tempDir[dirKey];
          } else {
            tempDir = null;
            break;
          }
        }
        if (tempDir) currentDir = tempDir;
      }
      
      if (currentDir) {
        const entries = Object.keys(currentDir);
        matches = entries
          .filter(name => name.toLowerCase().startsWith(partialName.toLowerCase()))
          .map(name => {
            const isDir = typeof currentDir[name] === 'object';
            return { name, display: name + (isDir ? '/' : '') };
          });
        const prefixPath = pathParts.length > 0 ? pathParts.join("/") + "/" : "";
        matches = matches.map(m => ({ ...m, full: prefixPath + m.display }));
      }
      completionType = 'path';
    }
    
    const currentInputContext = beforeCursor + '|' + afterCursor;
    const { completion } = shellState;
    
    if (completion.input === currentInputContext && completion.matches.length > 0) {
      completion.index = (completion.index + 1) % completion.matches.length;
    } else {
      completion.input = currentInputContext;
      completion.matches = matches;
      completion.index = 0;
    }
    
    if (completion.matches.length > 0) {
      const selected = completion.matches[completion.index];
      let replacement = completionType === 'cmd' ? selected : selected.full;
      const newBefore = beforeCursor.slice(0, beforeCursor.length - lastWord.length) + replacement;
      inputField.value = newBefore + afterCursor;
      inputField.setSelectionRange(newBefore.length, newBefore.length);
    }
    
    if (completion.matches.length > 1 && completion.index === 0 && completion.input === currentInputContext) {
      const suggestions = completion.matches.map(m => {
        const display = completionType === 'cmd' ? m : m.display;
        const isDir = display.endsWith('/');
        return `<span class="${isDir ? 'text-cyan-400' : 'text-yellow-400'}" style="text-shadow: 0 0 6px ${isDir ? 'rgba(0, 255, 255, 0.5)' : 'rgba(255, 255, 0, 0.5)'};">${display}</span>`;
      }).join("<span class='text-magenta-700 mx-2'>|</span>");
      print(suggestions, "raw");
    }
    return;
  }

  if (e.key === "c" && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    print("^C", "error");
    inputField.value = "";
    return;
  }

  if (e.key === "ArrowUp") {
    e.preventDefault();
    if (shellState.historyIndex > 0) {
      shellState.historyIndex--;
      inputField.value = shellState.history[shellState.historyIndex];
    }
  } else if (e.key === "ArrowDown") {
    e.preventDefault();
    if (shellState.historyIndex < shellState.history.length - 1) {
      shellState.historyIndex++;
      inputField.value = shellState.history[shellState.historyIndex];
    } else {
      shellState.historyIndex = shellState.history.length;
      inputField.value = "";
    }
  } else if (e.key === "Enter") {
    const input = inputField.value.trim();
    if (!input) return;

    const currentPath = shellState.path.join("/") || "reverse";
    print(`<span class="text-green-400 font-bold" style="text-shadow: 0 0 8px #00ff41;">${CONFIG.USER}@${CONFIG.HOST}:/${currentPath}$</span> <span class="text-cyan-400">${input}</span>`, "raw");
    
    shellState.history.push(input);
    shellState.historyIndex = shellState.history.length;

    const args = input.split(/\s+/);
    const cmd = args.shift().toLowerCase();

    if (commands[cmd]) {
      commands[cmd](...args);
    } else {
      print(`bash: ${cmd}: command not found`, "error");
    }

    inputField.value = "";
  }
}

/* =========================
   INIT & BOOT
========================= */
window.addEventListener('load', async () => {
  await playBootSequence();
  fileSystem = await loadFileSystem();
  initTerminal();
});

function playBootSequence() {
  return new Promise(resolve => {
    const bootLog = document.getElementById("boot-log");
    const lines = [
      `[ ${new Date().toLocaleTimeString()}] Loading Linux kernel 6.1.0...`,
      "[ OK ] Started Dispatch Password Requests to Console Key Watch.",
      "[ OK ] Reached target Graphical Interface.",
      "[ OK ] Started Network Manager.",
      `[ OK ] Logged in as ${CONFIG.USER}`
    ];
    
    let i = 0;
    const interval = setInterval(() => {
      if (i < lines.length) {
        bootLog.innerText += lines[i] + "\n";
        i++;
      } else {
        clearInterval(interval);
        setTimeout(() => {
          const screen = document.getElementById('boot-screen');
          screen.style.opacity = '0';
          setTimeout(() => {
            screen.style.display = 'none';
            resolve();
          }, 1000);
        }, 500);
      }
    }, 400);
  });
}

function initTerminal() {
  printWelcome();
  document.getElementById('cmd').focus();
  updatePrompt();
}

function printWelcome() {
  const tuxArt = `
<span class=\"text-cyan-400\" style=\"text-shadow: 0 0 8px #00ffff;\">
        .--.
       |o_o |
       |:_/ |
      //   \\\\ \\
     (|     | )
    /'\\_   _/\`
    \\\\___)=(___/
</span>
<span class="text-magenta-500 font-bold" style="text-shadow: 0 0 8px #ff00ff;">Reverse Engineering Writeups</span>
<span class="text-blue-400">Platforms: Linux, Windows, Android</span><br>
<span class="text-yellow-400 mt-2">Type <span class="text-cyan-400" style="text-shadow: 0 0 6px #00ffff;\">'help'</span> for a list of commands.</span><br>
`;
  print(tuxArt, "system");
}

/* Global keyboard shortcuts */
document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape') closeFileModal();
  if (event.ctrlKey && event.key === 'r') {
    event.preventDefault();
    if (!document.getElementById('file-modal').classList.contains('hidden')) toggleRawView();
  }
});
